name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'

      # --- Decode the permanent release keystore from secrets ---
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/vedo-release.jks

      # --- Generate key.properties so build.gradle.kts uses the release signingConfig ---
      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=vedo-release.jks
          EOF

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - name: List APK files
        run: find build/app/outputs -name "*.apk" 2>/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: vedo-apk
          path: build/app/outputs/flutter-apk/*.apk