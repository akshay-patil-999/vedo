<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Vedo — Connected Coaching Platform</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: #020617; color: #e2e8f0; }
    .glass { background: rgba(15,23,42,0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
    .animate-in { animation: slideIn .25s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
    @keyframes bounce2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .animate-bounce2 { animation: bounce2 1s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { createContext, useContext, useEffect, useMemo, useState, useCallback } = React;
    const { createRoot } = ReactDOM;

    /* FIREBASE CONFIG */
    const firebaseConfig = {
      apiKey: 'AIzaSyA81vHD1OouE3sPLzmgDUS_OH1waade5aY',
      authDomain: 'vedo-01.firebaseapp.com',
      projectId: 'vedo-01',
      storageBucket: 'vedo-01.firebasestorage.app',
      messagingSenderId: '1881105365',
      appId: '1:1881105365:web:9a016b072ff0b3c59ed35c'
    };

    let firestoreRef = null;
    let authRef = null;
    let backendReady = false;
    try {
      if (window.firebase?.apps?.length) { firebase.app(); } else { firebase.initializeApp(firebaseConfig); }
      firestoreRef = firebase.firestore();
      authRef = firebase.auth();
      backendReady = true;
    } catch (error) {
      console.warn('Firebase unavailable.', error);
    }

    function stamp() { return new Date().toISOString(); }
    function generateCode(length = 6) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < length; i += 1) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }
    const roleLabels = { student: 'Student', teacher: 'Teacher', owner: 'Owner', parent: 'Parent' };

    const AuthContext = createContext(null);
    const NavContext = createContext(null);
    const ToastContext = createContext(null);
    const AppDataContext = createContext(null);
    function useAuth() { return useContext(AuthContext); }
    function useNav() { return useContext(NavContext); }
    function useToast() { return useContext(ToastContext); }
    function useAppData() { return useContext(AppDataContext); }

    function NavProvider({ children }) {
      const [currentPath, setCurrentPath] = useState(() => window.location.hash.replace('#', '') || '/discover');
      const navigateTo = (path) => { setCurrentPath(path); window.history.pushState({}, '', '#' + path); };
      useEffect(() => {
        const onPop = () => setCurrentPath(window.location.hash.replace('#', '') || '/discover');
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);
      return <NavContext.Provider value={{ currentPath, navigateTo }}>{children}</NavContext.Provider>;
    }

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = (message, tone = 'info') => {
        const id = Date.now() + Math.random();
        setToasts((prev) => [...prev, { id, message, tone }]);
        window.setTimeout(() => setToasts((prev) => prev.filter((item) => item.id !== id)), 2800);
      };
      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed right-3 top-3 z-[80] flex flex-col gap-2 w-[90vw] max-w-sm">
            {toasts.map((toast) => (
              <div key={toast.id} className={`rounded-2xl border px-3 py-2 text-sm shadow-xl animate-in ${toast.tone === 'success' ? 'border-emerald-500/40 bg-emerald-600/95 text-white' : toast.tone === 'error' ? 'border-rose-500/40 bg-rose-600/95 text-white' : 'border-indigo-500/40 bg-slate-900/95 text-slate-100'}`}>
                {toast.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function AppDataProvider({ children }) {
      const [institutes, setInstitutes] = useState([]);
      const [classes, setClasses] = useState([]);
      const [users, setUsers] = useState([]);
      const [joinRequests, setJoinRequests] = useState([]);
      const [announcements, setAnnouncements] = useState([]);
      const [fees, setFees] = useState([]);
      const [schedules, setSchedules] = useState([]);
      const [notes, setNotes] = useState([]);
      const [homeworks, setHomeworks] = useState([]);
      const [doubts, setDoubts] = useState([]);
      const [feedbacks, setFeedbacks] = useState([]);
      const [marks, setMarks] = useState([]);
      const [courses, setCourses] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [dataReady, setDataReady] = useState(!backendReady);

      useEffect(() => {
        if (!backendReady || !firestoreRef) { setDataReady(true); return; }
        const unsubs = [];
        let pending = 0;
        const attach = (collectionName, setter) => {
          pending += 1;
          const unsub = firestoreRef.collection(collectionName).onSnapshot((snapshot) => {
            setter(snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() })));
            pending -= 1; if (pending <= 0) setDataReady(true);
          }, () => { pending -= 1; if (pending <= 0) setDataReady(true); });
          unsubs.push(unsub);
        };
        attach('institutes', setInstitutes); attach('classes', setClasses); attach('users', setUsers);
        attach('joinRequests', setJoinRequests); attach('announcements', setAnnouncements); attach('fees', setFees);
        attach('schedules', setSchedules); attach('notes', setNotes); attach('homeworks', setHomeworks);
        attach('doubts', setDoubts); attach('feedbacks', setFeedbacks); attach('marks', setMarks);
        attach('courses', setCourses); attach('bookings', setBookings);
        return () => unsubs.forEach((fn) => fn());
      }, []);

      const updateUser = useCallback(async (userDoc) => {
        if (!backendReady || !firestoreRef) { setUsers((prev) => [userDoc, ...prev.filter((i) => i.id !== userDoc.id)]); return; }
        await firestoreRef.collection('users').doc(userDoc.id).set({ ...userDoc, id: userDoc.id }, { merge: true });
      }, []);

      const createInstitute = useCallback(async ({ name, city, description, ownerId, ownerName }) => {
        const institute = { id: `INS-${Date.now()}`, name, city, description, ownerId, ownerName, code: generateCode(), createdAt: stamp(), teacherIds: [], studentIds: [], classIds: [] };
        if (backendReady && firestoreRef) await firestoreRef.collection('institutes').doc(institute.id).set(institute);
        else setInstitutes((prev) => [institute, ...prev]);
        if (ownerId) {
          const ownerDoc = users.find((i) => i.id === ownerId) || { id: ownerId, role: 'owner', instituteIds: [] };
          await updateUser({ ...ownerDoc, instituteIds: [...new Set([...(ownerDoc.instituteIds || []), institute.id])] });
        }
        return institute;
      }, [users, updateUser]);

      const createClass = useCallback(async ({ instituteId, ownerId, teacherId, teacherName, name, subject, fee, schedule, description }) => {
        const cls = { id: `CLS-${Date.now()}`, instituteId: instituteId || null, ownerId: ownerId || null, teacherId: teacherId || null, teacherName: teacherName || '', name, subject, fee: Number(fee || 0), schedule: schedule || 'Weekly', description: description || '', code: generateCode(), createdAt: stamp(), teacherIds: teacherId ? [teacherId] : [], studentIds: [] };
        if (backendReady && firestoreRef) await firestoreRef.collection('classes').doc(cls.id).set(cls);
        else setClasses((prev) => [cls, ...prev]);
        if (instituteId) {
          const inst = institutes.find((i) => i.id === instituteId);
          if (inst && backendReady && firestoreRef) await firestoreRef.collection('institutes').doc(instituteId).set({ classIds: [...new Set([...(inst.classIds || []), cls.id])] }, { merge: true });
        }
        if (teacherId) {
          const teacherDoc = users.find((i) => i.id === teacherId) || { id: teacherId, role: 'teacher', classIds: [] };
          await updateUser({ ...teacherDoc, classIds: [...new Set([...(teacherDoc.classIds || []), cls.id])] });
        }
        return cls;
      }, [institutes, users, updateUser]);

      const createJoinRequest = useCallback(async ({ targetType, targetId, targetName, requesterId, requesterName, role }) => {
        const payload = { id: `REQ-${Date.now()}`, targetType, targetId, targetName, requesterId, requesterName, role, status: 'pending', createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('joinRequests').doc(payload.id).set(payload);
        else setJoinRequests((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const approveRequest = useCallback(async (requestId) => {
        const request = joinRequests.find((i) => i.id === requestId);
        if (!request) return;
        if (backendReady && firestoreRef) await firestoreRef.collection('joinRequests').doc(requestId).set({ status: 'approved', updatedAt: stamp() }, { merge: true });
        else setJoinRequests((prev) => prev.map((i) => i.id === requestId ? { ...i, status: 'approved' } : i));
        const targetUser = users.find((i) => i.id === request.requesterId) || { id: request.requesterId, role: request.role, instituteIds: [], classIds: [] };
        const updatedUser = {
          ...targetUser, role: request.role,
          instituteIds: request.targetType === 'institute' ? [...new Set([...(targetUser.instituteIds || []), request.targetId])] : targetUser.instituteIds || [],
          classIds: request.targetType === 'class' ? [...new Set([...(targetUser.classIds || []), request.targetId])] : targetUser.classIds || []
        };
        await updateUser(updatedUser);
        if (request.targetType === 'institute' && backendReady && firestoreRef) {
          const inst = institutes.find((i) => i.id === request.targetId);
          if (inst) { const field = request.role === 'student' ? 'studentIds' : 'teacherIds'; await firestoreRef.collection('institutes').doc(request.targetId).set({ [field]: [...new Set([...(inst[field] || []), request.requesterId])] }, { merge: true }); }
        }
        if (request.targetType === 'class' && backendReady && firestoreRef) {
          const cls = classes.find((c) => c.id === request.targetId);
          if (cls) { const field = request.role === 'student' ? 'studentIds' : 'teacherIds'; await firestoreRef.collection('classes').doc(request.targetId).set({ [field]: [...new Set([...(cls[field] || []), request.requesterId])] }, { merge: true }); }
        }
        if (request.role === 'student') {
          const fee = { id: `FEE-${Date.now()}`, studentId: request.requesterId, studentName: request.requesterName, classId: request.targetType === 'class' ? request.targetId : null, status: 'pending', amount: 0, dueDate: stamp().slice(0, 10), createdAt: stamp() };
          if (backendReady && firestoreRef) await firestoreRef.collection('fees').doc(fee.id).set(fee);
          else setFees((prev) => [fee, ...prev]);
        }
      }, [joinRequests, users, institutes, classes, updateUser]);

      const rejectRequest = useCallback(async (requestId) => {
        if (backendReady && firestoreRef) await firestoreRef.collection('joinRequests').doc(requestId).set({ status: 'rejected' }, { merge: true });
        else setJoinRequests((prev) => prev.map((i) => i.id === requestId ? { ...i, status: 'rejected' } : i));
      }, []);

      const createAnnouncement = useCallback(async ({ title, message, instituteId, classId, createdBy }) => {
        const payload = { id: `ANN-${Date.now()}`, title, message, instituteId: instituteId || null, classId: classId || null, createdBy, createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('announcements').doc(payload.id).set(payload);
        else setAnnouncements((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const createFee = useCallback(async ({ studentId, studentName, classId, amount, dueDate }) => {
        const payload = { id: `FEE-${Date.now()}`, studentId, studentName, classId: classId || null, amount: Number(amount || 0), dueDate, status: 'pending', createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('fees').doc(payload.id).set(payload);
        else setFees((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const createSchedule = useCallback(async ({ title, time, classId, instituteId, createdBy }) => {
        const payload = { id: `SCH-${Date.now()}`, title, time, classId: classId || null, instituteId: instituteId || null, createdBy, createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('schedules').doc(payload.id).set(payload);
        else setSchedules((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const createNote = useCallback(async ({ title, content, classId, instituteId, createdBy }) => {
        const payload = { id: `NOTE-${Date.now()}`, title, content, classId: classId || null, instituteId: instituteId || null, createdBy, createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('notes').doc(payload.id).set(payload);
        else setNotes((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const createHomework = useCallback(async ({ title, description, dueDate, classId, instituteId, createdBy }) => {
        const payload = { id: `HW-${Date.now()}`, title, description, dueDate, classId: classId || null, instituteId: instituteId || null, createdBy, createdAt: stamp(), submissions: [] };
        if (backendReady && firestoreRef) await firestoreRef.collection('homeworks').doc(payload.id).set(payload);
        else setHomeworks((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const submitHomework = useCallback(async ({ homeworkId, studentId, studentName, status }) => {
        const newSub = { studentId, studentName, status, submittedAt: stamp() };
        if (backendReady && firestoreRef) {
          const homeworkDoc = await firestoreRef.collection('homeworks').doc(homeworkId).get();
          if (homeworkDoc.exists) { const data = homeworkDoc.data(); await firestoreRef.collection('homeworks').doc(homeworkId).set({ submissions: [...(data.submissions || []), newSub] }, { merge: true }); }
        } else {
          setHomeworks((prev) => prev.map((i) => i.id === homeworkId ? { ...i, submissions: [...(i.submissions || []), newSub] } : i));
        }
      }, []);

      const addDoubt = useCallback(async ({ question, classId, instituteId, studentId, studentName }) => {
        const payload = { id: `DOU-${Date.now()}`, question, classId: classId || null, instituteId: instituteId || null, studentId, studentName, status: 'open', createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('doubts').doc(payload.id).set(payload);
        else setDoubts((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const addFeedback = useCallback(async ({ text, studentId, teacherId, classId, instituteId }) => {
        const payload = { id: `FB-${Date.now()}`, text, studentId, teacherId, classId: classId || null, instituteId: instituteId || null, createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('feedbacks').doc(payload.id).set(payload);
        else setFeedbacks((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const addMark = useCallback(async ({ studentId, studentName, title, score, maxScore, classId, instituteId }) => {
        const payload = { id: `MARK-${Date.now()}`, studentId, studentName, title, score: Number(score || 0), maxScore: Number(maxScore || 0), classId: classId || null, instituteId: instituteId || null, createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('marks').doc(payload.id).set(payload);
        else setMarks((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const createCourse = useCallback(async ({ title, subject, teacherId, teacherName, duration, price, description }) => {
        const payload = { id: `CRS-${Date.now()}`, title, subject, teacherId, teacherName, duration, price: Number(price || 0), description: description || '', buyers: [], rating: 0, createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('courses').doc(payload.id).set(payload);
        else setCourses((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const buyCourse = useCallback(async ({ courseId, studentId, studentName }) => {
        const course = courses.find((c) => c.id === courseId);
        if (!course) return;
        const buyers = [...new Set([...(course.buyers || []), studentId])];
        if (backendReady && firestoreRef) await firestoreRef.collection('courses').doc(courseId).set({ buyers }, { merge: true });
        else setCourses((prev) => prev.map((c) => c.id === courseId ? { ...c, buyers } : c));
      }, [courses]);

      const createBooking = useCallback(async ({ teacherId, teacherName, studentId, studentName, type, note }) => {
        const payload = { id: `BOOK-${Date.now()}`, teacherId, teacherName, studentId, studentName, type: type || 'trial', note: note || '', status: 'pending', createdAt: stamp() };
        if (backendReady && firestoreRef) await firestoreRef.collection('bookings').doc(payload.id).set(payload);
        else setBookings((prev) => [payload, ...prev]);
        return payload;
      }, []);

      const value = {
        dataReady, institutes, classes, users, joinRequests, announcements, fees, schedules, notes, homeworks, doubts, feedbacks, marks, courses, bookings,
        createInstitute, createClass, createJoinRequest, approveRequest, rejectRequest, createAnnouncement, createFee, createSchedule, createNote,
        createHomework, submitHomework, addDoubt, addFeedback, addMark, updateUser, createCourse, buyCourse, createBooking
      };
      return <AppDataContext.Provider value={value}>{children}</AppDataContext.Provider>;
    }

    function AuthProvider({ children }) {
      const { navigateTo } = useNav();
      const { createInstitute } = useAppData();
      const [authUser, setAuthUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!backendReady || !authRef) { setLoading(false); return; }
        const unsubscribe = authRef.onAuthStateChanged(async (user) => {
          setAuthUser(user);
          if (!user) { setProfile(null); setLoading(false); return; }
          try {
            const snapshot = await firestoreRef.collection('users').doc(user.uid).get();
            if (snapshot.exists) setProfile({ id: user.uid, ...snapshot.data() });
            else setProfile({ id: user.uid, role: 'student', name: user.email, instituteIds: [], classIds: [] });
          } finally { setLoading(false); }
        });
        return unsubscribe;
      }, []);

      const login = async (email, password) => {
        if (!backendReady || !authRef) return { ok: false, message: 'Service unavailable. Please try again later.' };
        try {
          const result = await authRef.signInWithEmailAndPassword(email, password);
          const snapshot = await firestoreRef.collection('users').doc(result.user.uid).get();
          const profileData = snapshot.exists ? { id: result.user.uid, ...snapshot.data() } : { id: result.user.uid, role: 'student', name: result.user.email, instituteIds: [], classIds: [] };
          setProfile(profileData); setAuthUser(result.user);
          const target = profileData.role === 'owner' ? '/owner' : profileData.role === 'teacher' ? '/teacher' : profileData.role === 'parent' ? '/parent' : '/student';
          navigateTo(target);
          return { ok: true };
        } catch (error) { return { ok: false, message: error.message || 'Login failed.' }; }
      };

      const signup = async ({ email, password, role, name, instituteName, city }) => {
        if (!backendReady || !authRef) return { ok: false, message: 'Service unavailable. Please try again later.' };
        try {
          const result = await authRef.createUserWithEmailAndPassword(email, password);
          const profileData = { id: result.user.uid, authUid: result.user.uid, email, name, role, instituteIds: [], classIds: [], createdAt: stamp() };
          await firestoreRef.collection('users').doc(result.user.uid).set(profileData);
          setProfile(profileData); setAuthUser(result.user);
          if (role === 'owner' && instituteName) await createInstitute({ name: instituteName, city: city || '', description: 'New institute.', ownerId: result.user.uid, ownerName: name });
          const target = role === 'owner' ? '/owner' : role === 'teacher' ? '/teacher' : role === 'parent' ? '/parent' : '/student';
          navigateTo(target);
          return { ok: true };
        } catch (error) { return { ok: false, message: error.message || 'Signup failed.' }; }
      };

      const logout = async () => { if (authRef) await authRef.signOut(); setAuthUser(null); setProfile(null); navigateTo('/discover'); };

      const value = { authUser, profile, loading, login, signup, logout };
      return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
    }

    function Modal({ children, onClose }) {
      return (
        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-slate-950/70 px-4 py-6" onClick={onClose}>
          <div className="w-full max-w-md rounded-[28px] border border-white/10 bg-slate-900/95 shadow-2xl overflow-hidden" onClick={(e) => e.stopPropagation()}>
            {children}
          </div>
        </div>
      );
    }

    function BottomNavBar({ items, active, onChange }) {
      return (
        <div className="fixed bottom-0 left-0 right-0 z-50 border-t border-white/10 bg-slate-900/98 px-2 pb-[env(safe-area-inset-bottom)] pt-2 shadow-2xl backdrop-blur">
          <div className="mx-auto flex max-w-7xl flex-wrap gap-2 px-2 pb-2">
            {items.map((item) => (
              <button key={item.id} onClick={() => onChange(item.id)} className={`flex flex-1 flex-col items-center justify-center gap-1 rounded-2xl px-2 py-2 text-xs font-medium ${active === item.id ? 'bg-indigo-600 text-white' : 'bg-white/5 text-slate-300 hover:bg-white/10'}`}>
                <span className="text-base">{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    function ScreenShell({ title, subtitle, children, right }) {
      const { profile, logout } = useAuth();
      const { navigateTo } = useNav();
      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 pb-24">
          <div className="mx-auto flex max-w-7xl flex-col gap-6 px-4 py-6 sm:px-6 lg:px-8">
            <div className="glass rounded-3xl border border-white/10 p-4 shadow-2xl">
              <div className="flex flex-wrap items-center justify-between gap-3">
                <div>
                  <div className="text-sm uppercase tracking-[0.3em] text-indigo-300">Vedo</div>
                  <h1 className="text-2xl font-semibold">{title}</h1>
                  <p className="text-sm text-slate-400">{subtitle}</p>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => navigateTo('/discover')} className="rounded-full border border-white/10 bg-white/5 px-3 py-2 text-sm">Home</button>
                  {profile ? <button onClick={logout} className="rounded-full bg-rose-500 px-3 py-2 text-sm font-medium text-white">Logout</button> : <button onClick={() => navigateTo('/auth')} className="rounded-full bg-indigo-600 px-3 py-2 text-sm font-medium text-white">Login</button>}
                  {right}
                </div>
              </div>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function AuthScreen({ compact = false }) {
      const [mode, setMode] = useState('login');
      const [role, setRole] = useState('student');
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [instituteName, setInstituteName] = useState('');
      const [city, setCity] = useState('');
      const [message, setMessage] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const { login, signup } = useAuth();
      const { addToast } = useToast();

      const handleSubmit = async (event) => {
        event.preventDefault();
        setMessage(''); setSubmitting(true);
        const result = mode === 'login' ? await login(email, password) : await signup({ email, password, role, name, instituteName, city });
        setSubmitting(false);
        if (!result.ok) { setMessage(result.message); addToast(result.message, 'error'); }
        else addToast(mode === 'login' ? 'Signed in successfully' : 'Account created successfully', 'success');
      };

      return (
        <div className={compact ? '' : 'min-h-screen bg-slate-950 px-4 py-10'}>
          <div className={compact ? 'space-y-4' : 'mx-auto max-w-md rounded-[32px] border border-white/10 bg-slate-900/70 p-6 shadow-2xl'}>
            <div className="flex rounded-full border border-white/10 bg-white/5 p-1">
              {['login', 'signup'].map((item) => (
                <button key={item} onClick={() => setMode(item)} className={`flex-1 rounded-full px-3 py-2 text-sm font-medium ${mode === item ? 'bg-indigo-600 text-white' : 'text-slate-300'}`}>{item === 'login' ? 'Login' : 'Sign up'}</button>
              ))}
            </div>
            <form onSubmit={handleSubmit} className="space-y-3">
              <select value={role} onChange={(event) => setRole(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm text-slate-100">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="owner">Owner</option>
                <option value="parent">Parent</option>
              </select>
              {mode === 'signup' && <>
                <input required value={name} onChange={(event) => setName(event.target.value)} placeholder="Your name" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
                {role === 'owner' && <>
                  <input value={instituteName} onChange={(event) => setInstituteName(event.target.value)} placeholder="Institute name" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
                  <input value={city} onChange={(event) => setCity(event.target.value)} placeholder="City" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
                </>}
              </>}
              <input required type="email" value={email} onChange={(event) => setEmail(event.target.value)} placeholder="Email address" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
              <input required type="password" value={password} onChange={(event) => setPassword(event.target.value)} placeholder="Password" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
              <button disabled={submitting} className="w-full rounded-2xl bg-indigo-600 px-3 py-3 text-sm font-semibold text-white disabled:opacity-50">{submitting ? 'Please wait…' : mode === 'login' ? 'Login' : 'Create account'}</button>
            </form>
            {message ? <div className="rounded-2xl border border-rose-400/20 bg-rose-500/10 p-3 text-sm text-rose-200">{message}</div> : null}
          </div>
        </div>
      );
    }

    function PlaceholderApp() {
      const { currentPath } = useNav();
      const { profile, loading } = useAuth();
      if (loading) return <div className="flex min-h-screen items-center justify-center bg-slate-950 text-slate-100">Loading…</div>;
      if (currentPath === '/auth') return <AuthScreen />;
      return (
        <ScreenShell title="Section 1 OK" subtitle="Core + Auth wired. Waiting for Section 2.">
          <div className="glass rounded-3xl border border-white/10 p-5">
            <p>Logged in as: {profile ? `${profile.name} (${profile.role})` : 'Not logged in'}</p>
          </div>
        </ScreenShell>
      );
    }

    function App() {
      return (
        <NavProvider>
          <ToastProvider>
            <AppDataProvider>
              <AuthProvider>
                <PlaceholderApp />
              </AuthProvider>
            </AppDataProvider>
          </ToastProvider>
        </NavProvider>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
