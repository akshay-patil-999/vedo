                <div className="mt-4">
                  <div className="font-semibold text-slate-200">Fee reminders</div>
                  <form onSubmit={addNewFee} className="mt-3 space-y-3"><div className="grid gap-3 md:grid-cols-2"><select value={selectedClass} onChange={(event) => { setSelectedClass(event.target.value); setSelectedStudent(''); }} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">Select class</option>{ownerClasses.map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}</select><select value={selectedStudent} onChange={(event) => setSelectedStudent(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">Select student</option>{classStudents.map((student) => <option key={student.id} value={student.id}>{student.name}</option>)}</select></div><div className="grid gap-3 md:grid-cols-2"><input value={fee} onChange={(event) => setFee(event.target.value)} placeholder="Fee amount" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input type="date" value={feeDueDate} onChange={(event) => setFeeDueDate(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /></div><button className="rounded-xl bg-amber-500 px-3 py-2 text-sm hover:bg-amber-400 transition-all">Create reminder</button></form>
                  <div className="mt-4 space-y-2">{ownerFees.length ? ownerFees.map((item) => {
                    const cls = classes.find((clsItem) => clsItem.id === item.classId);
                    const inst = cls ? institutes.find((instItem) => instItem.id === cls.instituteId) : null;
                    return <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.studentName || 'Student'} • {cls?.name || 'Class'}{inst ? ` • ${inst.name}` : ''}</div><div className="mt-1 text-sm text-slate-400">₹{item.amount} • Due: {item.dueDate} • Status: {item.status}</div>{item.status === 'pending' ? <button onClick={() => sendFeeReminder(item)} className="mt-3 rounded-xl bg-indigo-600 px-3 py-2 text-xs hover:bg-indigo-500 transition-all">Send reminder</button> : null}</div>;
                  }) : <div className="text-sm text-slate-400">No fee reminders yet.</div>}</div>
                </div>
              </div>
            )}
            {activeTab === 'settings' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Settings</h3><div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-4 text-sm text-slate-300">Institute creation is in the ☰ menu under Overview. My Batches, Schedule, Alerts and Wallet are always one tap away at the bottom.</div></div>}
          </div>
        </ScreenShell>
      );
    }

    // ------------------------------------------------------------------
    // PARENT DASHBOARD
    // ------------------------------------------------------------------
    // Parents link to one or more children using the child's login email
    // plus the unique parent code shown on the child's own dashboard
    // (☰ → Parent Code). Once linked, the relationship is stored on both
    // the parent's and student's `users` doc (see linkChildToParent in
    // AppDataProvider) and syncs to Firestore like everything else, so it
    // survives refresh/relogin on any device.
    function ParentDashboard() {
      const { profile } = useAuth();
      const { users, classes, institutes, fees, marks, attendances, feedbacks, doubts, schedules, tests, homeworks, announcements, updateFee, linkChildToParent, unlinkChild } = useAppData();
      const { addToast } = useToast();
      const [activeTab, setActiveTab] = useState('marks');
      const [childEmail, setChildEmail] = useState('');
      const [parentCodeInput, setParentCodeInput] = useState('');
      const [selectedChildId, setSelectedChildId] = useState('');

      const myRecord = users.find((item) => item.id === profile?.id) || profile;
      const linkedChildren = myRecord?.linkedChildren || [];

      useEffect(() => {
        if (linkedChildren.length && !linkedChildren.some((child) => child.id === selectedChildId)) {
          setSelectedChildId(linkedChildren[0].id);
        }
        if (!linkedChildren.length && selectedChildId) setSelectedChildId('');
      }, [linkedChildren.map((child) => child.id).join('|')]);

      const child = users.find((item) => item.id === selectedChildId) || null;
      const childMeta = linkedChildren.find((c) => c.id === selectedChildId) || null;
      const childName = child?.name || childMeta?.name || 'your child';

      const childClasses = classes.filter((cls) => cls.studentIds?.includes(selectedChildId) || (child?.classIds || []).includes(cls.id));
      const childInstitutes = institutes.filter((inst) => inst.studentIds?.includes(selectedChildId) || (child?.instituteIds || []).includes(inst.id));
      const childMarks = marks.filter((item) => item.studentId === selectedChildId).sort((a, b) => safeSortKey(b.createdAt) - safeSortKey(a.createdAt));
      const childTests = tests.filter((item) => childClasses.some((cls) => cls.id === item.classId) || childInstitutes.some((inst) => inst.id === item.instituteId)).sort((a, b) => (a.dueDate || '').localeCompare(b.dueDate || ''));
      const childAttendance = attendances.filter((item) => item.studentId === selectedChildId).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const presentCount = childAttendance.filter((item) => item.present).length;
      const attendancePct = childAttendance.length ? Math.round((presentCount / childAttendance.length) * 100) : null;
      const dayOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      const childSchedule = schedules.filter((item) => childClasses.some((cls) => cls.id === item.classId) || childInstitutes.some((inst) => inst.id === item.instituteId)).sort((a, b) => dayOrder.indexOf(a.day) - dayOrder.indexOf(b.day) || (a.time || '').localeCompare(b.time || ''));
      const childFees = fees.filter((item) => item.studentId === selectedChildId);
      const childFeedbacks = feedbacks.filter((item) => item.studentId === selectedChildId).sort((a, b) => safeSortKey(b.createdAt) - safeSortKey(a.createdAt));
      const childDoubts = doubts.filter((item) => item.studentId === selectedChildId).sort((a, b) => safeSortKey(b.createdAt) - safeSortKey(a.createdAt));
      const childHomeworks = homeworks.filter((item) => childClasses.some((cls) => cls.id === item.classId));
      const childAnnouncements = announcements.filter((item) => {
        if (item.studentId) return item.studentId === selectedChildId;
        if (item.classId) return childClasses.some((cls) => cls.id === item.classId);
        if (item.instituteId) return childInstitutes.some((inst) => inst.id === item.instituteId);
        return false;
      });

      const getClassName = (id) => classes.find((c) => c.id === id)?.name || 'Class';
      const getInstituteName = (id) => institutes.find((i) => i.id === id)?.name || 'Institute';

      const handleLinkChild = async (event) => {
        event.preventDefault();
        if (!childEmail.trim() || !parentCodeInput.trim()) return addToast("Enter your child's email and their parent code", 'error');
        const result = await linkChildToParent({ parentId: profile.id, parentName: profile.name, childEmail: childEmail.trim(), parentCode: parentCodeInput.trim() });
        if (!result.ok) {
          addToast(result.message, 'error');
          return;
        }
        addToast(`Linked to ${result.studentName}'s account`, 'success');
        setChildEmail('');
        setParentCodeInput('');
        setActiveTab('overview');
      };

      const removeChild = async (id) => {
        await unlinkChild(profile.id, id);
        addToast('Child unlinked', 'info');
      };

      const payFee = async (feeItem) => {
        await updateFee({ ...feeItem, status: 'paid' });
        addToast('Payment recorded — thank you!', 'success');
      };

      const bottomTabs = [
        { id: 'marks', label: 'Marks', icon: '📊' },
        { id: 'attendance', label: 'Attendance', icon: '📅' },
        { id: 'fees', label: 'Fees', icon: '💰' },
        { id: 'feedback', label: 'Feedback', icon: '💬' }
      ];
      const tabs = [
        { id: 'link', label: 'Link a child', icon: '🔗' },
        { id: 'overview', label: 'Overview', icon: '🏠' },
        ...bottomTabs,
        { id: 'schedule', label: 'Schedule', icon: '🗓️' },
        { id: 'homework', label: 'Homework', icon: '📝' },
        { id: 'children', label: 'My children', icon: '👪' },
        { id: 'profile', label: 'Profile', icon: '👤' }
      ];

      const hasChildren = linkedChildren.length > 0;

      return (
        <ScreenShell title="Parent dashboard" subtitle="Marks, attendance, fees and feedback are one tap away. Everything else lives in the ☰ menu." navItems={tabs} bottomNavItems={bottomTabs} activeNavId={activeTab} onNavChange={setActiveTab}>
          <div className="space-y-5">
            {hasChildren && linkedChildren.length > 1 && activeTab !== 'link' && activeTab !== 'children' && (
              <div className="glass rounded-3xl border border-white/10 p-3 card-hover">
                <div className="flex items-center gap-2 overflow-x-auto">
                  {linkedChildren.map((c) => (
                    <button key={c.id} onClick={() => setSelectedChildId(c.id)} className={`flex-none rounded-xl px-3 py-2 text-sm font-medium ${selectedChildId === c.id ? 'bg-indigo-600 text-white' : 'bg-white/5 text-slate-300'} transition-all`}>{c.name}</button>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'link' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">Link a child's account</h3>
                <p className="text-sm text-slate-400">Ask your child to open ☰ → Parent Code on their own dashboard, then enter their login email and that code below.</p>
                <form onSubmit={handleLinkChild} className="mt-4 space-y-3">
                  <input value={childEmail} onChange={(event) => setChildEmail(event.target.value)} type="email" required placeholder="Child's login email" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
                  <input value={parentCodeInput} onChange={(event) => setParentCodeInput(event.target.value)} required placeholder="Parent code" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm tracking-widest" />
                  <button className="w-full rounded-xl bg-indigo-600 px-3 py-3 text-sm font-semibold hover:bg-indigo-500 transition-all">Link child</button>
                </form>
              </div>
            )}

            {!hasChildren && activeTab !== 'link' ? (
              <div className="glass rounded-3xl border border-white/10 p-6 text-center card-hover">
                <div className="text-3xl">👪</div>
                <h3 className="mt-2 text-lg font-semibold">No child linked yet</h3>
                <p className="mt-1 text-sm text-slate-400">Link your child's account first to see their marks, attendance, fees and feedback — and pay fees on their behalf.</p>
                <button onClick={() => setActiveTab('link')} className="mt-4 rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold hover:bg-indigo-500 transition-all">Link a child</button>
              </div>
            ) : null}

            {hasChildren && activeTab === 'overview' && (
              <div className="grid gap-4 xl:grid-cols-2">
                <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                  <h3 className="text-lg font-semibold">{childName}'s snapshot</h3>
                  <div className="mt-3 grid grid-cols-2 gap-3">
                    <div className="rounded-2xl border border-indigo-400/20 bg-indigo-500/10 p-3">
                      <div className="text-2xl font-bold text-indigo-200">{attendancePct !== null ? `${attendancePct}%` : '—'}</div>
                      <div className="text-xs text-indigo-200/80">Attendance</div>
                    </div>
                    <div className="rounded-2xl border border-emerald-400/20 bg-emerald-500/10 p-3">
                      <div className="text-2xl font-bold text-emerald-200">{childMarks.length}</div>
                      <div className="text-xs text-emerald-200/80">Test results</div>
                    </div>
                  </div>
                  <div className="mt-3 space-y-2">
                    {childClasses.length ? childClasses.map((cls) => <div key={cls.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{cls.name}</div><div className="text-sm text-slate-400">{getInstituteName(cls.instituteId)}</div></div>) : <div className="text-sm text-slate-400">No batch info yet.</div>}
                  </div>
                </div>
                <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                  <h3 className="text-lg font-semibold">Announcements</h3>
                  <div className="mt-3 space-y-2">{childAnnouncements.length ? childAnnouncements.slice(0, 6).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">{item.message}</div></div>) : <div className="text-sm text-slate-400">No announcements yet.</div>}</div>
                </div>
              </div>
            )}

            {hasChildren && activeTab === 'marks' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">{childName}'s test marks</h3>
                <div className="mt-4 space-y-2">{childMarks.length ? childMarks.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">Score: {item.score}/{item.maxScore}</div></div>) : <div className="text-sm text-slate-400">No marks recorded yet.</div>}</div>
                <h3 className="mt-6 text-lg font-semibold">Upcoming tests</h3>
                <div className="mt-3 space-y-2">{childTests.length ? childTests.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">{item.subject} • Date: {item.dueDate || 'TBA'} • {getClassName(item.classId)}</div></div>) : <div className="text-sm text-slate-400">No tests scheduled.</div>}</div>
              </div>
            )}

            {hasChildren && activeTab === 'attendance' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">Attendance</h3>
                <div className="mt-2 text-sm text-slate-400">{attendancePct !== null ? `${presentCount} of ${childAttendance.length} classes attended (${attendancePct}%)` : 'No attendance recorded yet.'}</div>
                <div className="mt-4 space-y-2">{childAttendance.length ? childAttendance.slice(0, 25).map((item) => <div key={item.id} className="flex items-center justify-between rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><span>{item.date} • {getClassName(item.classId)}</span><span className={item.present ? 'text-sm font-medium text-emerald-300' : 'text-sm font-medium text-rose-300'}>{item.present ? 'Present' : 'Absent'}</span></div>) : <div className="text-sm text-slate-400">No attendance recorded yet.</div>}</div>
              </div>
            )}

            {hasChildren && activeTab === 'schedule' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">Timetable</h3>
                <div className="mt-4 space-y-2">{childSchedule.length ? childSchedule.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="flex items-center justify-between gap-3"><div className="font-medium">{item.subject || item.title}</div><span className="rounded-full bg-indigo-500/10 px-2.5 py-1 text-xs font-medium text-indigo-300">{item.day}</span></div><div className="mt-1 text-sm text-slate-400">{item.time || 'Time TBA'} • {getClassName(item.classId)}</div></div>) : <div className="text-sm text-slate-400">No timetable shared yet.</div>}</div>
              </div>
            )}

            {hasChildren && activeTab === 'homework' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">Homework status</h3>
                <div className="mt-4 space-y-2">{childHomeworks.length ? childHomeworks.map((item) => {
                  const submitted = (item.submissions || []).some((sub) => sub.studentId === selectedChildId);
                  return (
                    <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover">
                      <div className="font-medium">{item.title}</div>
                      <div className="text-sm text-slate-400">Due: {item.dueDate || 'No due date'}</div>
                      <span className={`mt-2 inline-flex rounded-full px-2.5 py-1 text-xs font-medium ${submitted ? 'bg-emerald-500/10 text-emerald-300' : 'bg-amber-500/10 text-amber-300'}`}>{submitted ? '✅ Submitted' : '⏳ Pending'}</span>
                    </div>
                  );
                }) : <div className="text-sm text-slate-400">No homework assigned yet.</div>}</div>
              </div>
            )}

            {hasChildren && activeTab === 'fees' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">Fees</h3>
                <div className="mt-4 space-y-2">{childFees.length ? childFees.map((item) => {
                  const cls = classes.find((c) => c.id === item.classId);
                  const inst = cls ? institutes.find((i) => i.id === cls.instituteId) : null;
                  return (
                    <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover">
                      <div className="font-medium">{inst?.name || 'Institute'} • {cls?.name || 'Class'}</div>
                      <div className="mt-1 text-sm text-slate-400">₹{item.amount} • Due: {item.dueDate} • Status: {item.status}</div>
                      {item.status === 'pending' ? <button onClick={() => payFee(item)} className="mt-3 rounded-xl bg-emerald-600 px-3 py-2 text-xs font-semibold hover:bg-emerald-500 transition-all">Pay now</button> : <span className="mt-3 inline-flex rounded-full bg-emerald-500/10 px-2.5 py-1 text-xs font-medium text-emerald-300">✅ Paid</span>}
                    </div>
                  );
                }) : <div className="text-sm text-slate-400">No fee records yet.</div>}</div>
              </div>
            )}

            {hasChildren && activeTab === 'feedback' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">Teacher feedback</h3>
                <div className="mt-4 space-y-2">{childFeedbacks.length ? childFeedbacks.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="text-sm text-slate-200">{item.text}</div><div className="mt-1 text-xs text-slate-400">{safeDateText(item.createdAt)}</div></div>) : <div className="text-sm text-slate-400">No feedback yet.</div>}</div>
                <h3 className="mt-6 text-lg font-semibold">Doubts asked</h3>
                <div className="mt-3 space-y-2">{childDoubts.length ? childDoubts.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.question}</div><div className="mt-1 text-sm text-slate-400">Status: {item.status === 'resolved' ? '✅ Resolved' : '⏳ Open'}</div>{item.reply ? <div className="mt-2 rounded-xl border border-emerald-500/20 bg-emerald-500/5 p-3 text-sm text-emerald-200">{item.reply}</div> : null}</div>) : <div className="text-sm text-slate-400">No doubts asked yet.</div>}</div>
              </div>
            )}

            {activeTab === 'children' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">My children</h3>
                <div className="mt-4 space-y-2">{linkedChildren.length ? linkedChildren.map((c) => <div key={c.id} className="flex items-center justify-between rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div><div className="font-medium">{c.name}</div><div className="text-sm text-slate-400">{c.email}</div></div><button onClick={() => removeChild(c.id)} className="rounded-xl bg-rose-500/10 px-3 py-2 text-xs font-medium text-rose-300 hover:bg-rose-500/20 transition-all">Unlink</button></div>) : <div className="text-sm text-slate-400">No children linked yet.</div>}</div>
                <button onClick={() => setActiveTab('link')} className="mt-4 w-full rounded-xl bg-indigo-600 px-3 py-3 text-sm font-semibold hover:bg-indigo-500 transition-all">Link another child</button>
              </div>
            )}

            {activeTab === 'profile' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">Profile</h3>
                <div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-4">
                  <div className="font-semibold">{profile?.name}</div>
                  <div className="text-sm text-slate-400">{profile?.email}</div>
                  <div className="mt-2 text-sm text-slate-400">Linked children: {linkedChildren.length}</div>
                </div>
              </div>
            )}
          </div>
        </ScreenShell>
      );
    }

    // =====================================================
    // ADMISSION CHATBOT (Floating) — ported from the Vedo frontend concept.
    // Purely informational/static FAQ, same as its original design, so no
    // backend wiring is needed here (it never reads or writes user data).
    // =====================================================
    function AdmissionChatbot() {
      const [open, setOpen] = useState(false);
      const [chats, setChats] = useState([
        { sender: 'bot', text: 'Hi! I\'m the Vedo assistant. 🎓\n\nAsk me about any of the topics below:' },
      ]);

      const options = [
        { key: 'timing', label: '⏰ Class timing', answer: 'Class timings vary by batch — check the batch card on Discover or ask the institute directly for exact slots.' },
        { key: 'fees', label: '💰 Fees', answer: 'Every batch shows its monthly fee right on its card. Once you join, you can track and pay fees from your Student dashboard.' },
        { key: 'join', label: '📝 How to join', answer: 'Sign up, then use an institute or batch code to send a join request. The owner/teacher approves it and you\'re in!' },
        { key: 'features', label: '📱 What Vedo offers', answer: 'Live batches, notes, homework, doubt solving, attendance, fee tracking, and parent linking — all in one place.' },
        { key: 'trial', label: '🎯 Book a trial', answer: 'Open the Marketplace from Discover, pick a teacher, and tap "Book trial" — your request goes straight to them.' },
      ];

      const query = (opt) => {
        setChats((prev) => [...prev, { sender: 'user', text: opt.label }, { sender: 'bot', text: opt.answer }]);
      };

      return (
        <div className="fixed bottom-5 right-5 z-[95] text-xs">
          {open ? (
            <div className="w-72 max-w-[85vw] glass rounded-2xl border border-white/10 shadow-2xl flex flex-col overflow-hidden animate-slide-in" style={{ height: '380px' }}>
              <div className="bg-slate-900 text-white p-3 flex justify-between items-center shrink-0">
                <div>
                  <p className="font-black text-xs gradient-text">Vedo Bot 🤖</p>
                  <p className="text-[9px] text-slate-400">Always online</p>
                </div>
                <button onClick={() => setOpen(false)} className="text-slate-400 hover:text-white">✕</button>
              </div>
              <div className="flex-1 p-3 bg-slate-950/60 space-y-2 overflow-y-auto">
                {chats.map((c, i) => (
                  <div key={i} className={`flex ${c.sender === 'bot' ? 'justify-start' : 'justify-end'}`}>
                    <p className={`p-2.5 rounded-xl max-w-[85%] text-[10px] leading-relaxed whitespace-pre-wrap ${c.sender === 'bot' ? 'bg-slate-800 text-slate-100 border border-white/10' : 'bg-indigo-600 text-white'}`}>{c.text}</p>
                  </div>
                ))}
              </div>
              <div className="p-2 border-t border-white/10 bg-slate-900 shrink-0">
                <p className="text-[9px] text-slate-500 font-bold mb-1.5">Quick options:</p>
                <div className="flex flex-wrap gap-1">
                  {options.map((o) => (
                    <button key={o.key} onClick={() => query(o)} className="bg-indigo-500/10 text-indigo-300 text-[8px] font-bold px-2 py-1 rounded-lg hover:bg-indigo-500/20 transition-all">{o.label}</button>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            <button onClick={() => setOpen(true)} className="bg-indigo-600 hover:bg-indigo-500 text-white w-12 h-12 rounded-full shadow-2xl text-xl flex items-center justify-center transition-all animate-bounce2">💬</button>
          )}
        </div>
      );
    }

    function AppRouter() {
      const { currentPath } = useNav();
      const { profile, loading } = useAuth();
      const isPublicRoute = currentPath === '/discover' || currentPath === '/' || currentPath === '';
      const isAuthRoute = currentPath === '/auth' || currentPath === '/login' || currentPath === '/signup';
      const showChatbot = isPublicRoute || isAuthRoute || currentPath === '/marketplace';

      if (loading) return <div className="flex min-h-screen items-center justify-center bg-slate-950 text-slate-100">Loading your workspace...</div>;
      if (isAuthRoute) return <><AuthScreen />{showChatbot ? <AdmissionChatbot /> : null}</>;
      if (currentPath === '/marketplace') return <><MarketplaceScreen />{showChatbot ? <AdmissionChatbot /> : null}</>;
      if (!profile) return <><DiscoverScreen />{showChatbot ? <AdmissionChatbot /> : null}</>;
      if (isPublicRoute) return <><DiscoverScreen />{showChatbot ? <AdmissionChatbot /> : null}</>;
      if (currentPath === '/owner') return <OwnerDashboard />;
      if (currentPath === '/teacher') return <TeacherDashboard />;
      if (currentPath === '/parent') return <ParentDashboard />;
      if (currentPath === '/student' || currentPath.startsWith('/student')) return <StudentDashboard />;
      return <StudentDashboard />;
    }

    function App() {
      return (
        <ThemeProvider>
          <NavProvider>
            <ToastProvider>
              <AppDataProvider>
                <AuthProvider>
                  <ErrorBoundary>
                    <AppRouter />
                  </ErrorBoundary>
                </AuthProvider>
              </AppDataProvider>
            </ToastProvider>
          </NavProvider>
        </ThemeProvider>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
