<body>
  <div id="root"></div>
  <script type="text/babel">
    const { createContext, useContext, useEffect, useMemo, useRef, useState } = React;
    const { createRoot } = ReactDOM;

    const StorageKeys = { USER: 'vedo_user', DATA: 'vedo_app_data', OFFLINE: 'vedo_offline_queue' };

    const db = {
      get: (key, fallback) => {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      },
      set: (key, value) => {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
      }
    };

    const firebaseConfig = {
      apiKey: 'AIzaSyA81vHD1OouE3sPLzmgDUS_OH1waade5aY',
      authDomain: 'vedo-01.firebaseapp.com',
      projectId: 'vedo-01',
      storageBucket: 'vedo-01.firebasestorage.app',
      messagingSenderId: '1881105365',
      appId: '1:1881105365:web:9a016b072ff0b3c59ed35c'
    };

    const VEDO_FCM_VAPID_KEY = 'PASTE_YOUR_WEB_PUSH_VAPID_KEY_HERE';

    let firestoreRef = null;
    let authRef = null;
    let googleProviderRef = null;
    let messagingRef = null;
    let backendReady = false;
    try {
      if (window.firebase?.apps?.length) {
        firebase.app();
      } else {
        firebase.initializeApp(firebaseConfig);
      }
      firestoreRef = firebase.firestore();
      authRef = firebase.auth();
      authRef.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .catch((err) => console.warn('Auth persistence set failed:', err));
      googleProviderRef = new firebase.auth.GoogleAuthProvider();
      googleProviderRef.setCustomParameters({ prompt: 'select_account' });
      backendReady = true;
    } catch (error) {
      console.warn('Firebase unavailable, using local fallback.', error);
    }
    try {
      if (backendReady && typeof firebase.messaging === 'function' && firebase.messaging.isSupported && firebase.messaging.isSupported()) {
        messagingRef = firebase.messaging();
      }
    } catch (error) {
      console.warn('Firebase Messaging unavailable on this device.', error);
    }

    const initialState = {
      institutes: [], classes: [], users: [], joinRequests: [], announcements: [],
      fees: [], schedules: [], notes: [], homeworks: [], doubts: [], feedbacks: [], marks: [], attendances: [],
      tests: [], teacherPayments: [], trialBookings: [], syllabi: [], teacherLectures: []
    };

    const roleLabels = { student: 'Student', teacher: 'Teacher', owner: 'Owner', parent: 'Parent' };

    function getStudentRosterForClass(classItem, users = [], joinRequests = [], extraRecords = []) {
      if (!classItem) return [];
      const classId = classItem.id;
      const studentIds = new Set();
      const addStudent = (studentId) => {
        if (studentId) studentIds.add(studentId);
      };

      (classItem.studentIds || []).forEach(addStudent);
      (users || []).forEach((user) => {
        if (!user || user.role !== 'student') return;
        const classIds = Array.isArray(user.classIds) ? user.classIds : [];
        if (classIds.includes(classId)) addStudent(user.id);
        if (classItem.instituteId && Array.isArray(user.instituteIds) && user.instituteIds.includes(classItem.instituteId)) addStudent(user.id);
      });
      (joinRequests || []).forEach((request) => {
        if (request?.status === 'approved' && request.targetType === 'class' && request.targetId === classId && request.role === 'student') {
          addStudent(request.requesterId);
        }
      });

      const resolveName = (id) => {
        const user = (users || []).find((item) => item.id === id) || null;
        if (user?.name) return user.name;
        if (user?.email) return user.email;
        const approvedRequest = (joinRequests || []).find((request) => request.requesterId === id
          && request.status === 'approved'
          && request.role === 'student'
          && ((request.targetType === 'class' && request.targetId === classId)
            || (request.targetType === 'institute' && classItem.instituteId && request.targetId === classItem.instituteId)));
        if (approvedRequest?.requesterName) return approvedRequest.requesterName;
        const knownRecord = (extraRecords || []).find((record) => record?.studentId === id && record?.studentName);
        if (knownRecord?.studentName) return knownRecord.studentName;
        return null;
      };

      return Array.from(studentIds).map((id) => {
        const user = (users || []).find((item) => item.id === id) || null;
        const resolvedName = resolveName(id) || 'Unnamed student';
        return {
          id,
          name: resolvedName,
          email: user?.email || '',
          role: user?.role || 'student',
          classId,
          className: classItem.name,
          displayName: resolvedName
        };
      });
    }

    function getStudentDisplayName(student) {
      if (!student) return 'Student';
      return student.studentName || student.name || student.displayName || student.email || 'Unnamed student';
    }

    function getStudentIdLabel() {
      return '';
    }

    function getTeacherRosterForClass(classItem, users = [], joinRequests = []) {
      if (!classItem) return [];
      const classId = classItem.id;
      const teacherIds = new Set();
      const addTeacher = (teacherId) => { if (teacherId) teacherIds.add(teacherId); };

      addTeacher(classItem.teacherId);
      (classItem.teacherIds || []).forEach(addTeacher);
      (joinRequests || []).forEach((request) => {
        if (request?.status === 'approved' && request.role === 'teacher'
          && ((request.targetType === 'class' && request.targetId === classId)
            || (request.targetType === 'institute' && classItem.instituteId && request.targetId === classItem.instituteId))) {
          addTeacher(request.requesterId);
        }
      });

      const resolveName = (id) => {
        const user = (users || []).find((item) => item.id === id) || null;
        if (user?.name) return user.name;
        if (user?.email) return user.email;
        if (id === classItem.teacherId && classItem.teacherName) return classItem.teacherName;
        const approvedRequest = (joinRequests || []).find((request) => request.requesterId === id
          && request.status === 'approved'
          && request.role === 'teacher'
          && ((request.targetType === 'class' && request.targetId === classId)
            || (request.targetType === 'institute' && classItem.instituteId && request.targetId === classItem.instituteId)));
        if (approvedRequest?.requesterName) return approvedRequest.requesterName;
        return null;
      };

      return Array.from(teacherIds).map((id) => {
        const user = (users || []).find((item) => item.id === id) || null;
        const resolvedName = resolveName(id) || 'Unnamed teacher';
        return { id, name: resolvedName, email: user?.email || '', role: 'teacher', classId, className: classItem.name, displayName: resolvedName };
      });
    }

    // A teacher's subject inside a given class — falls back to the class's own
    // single subject if no explicit teacher→subject mapping exists (e.g. the
    // class creator, who is auto-assigned subjects[0] at creation time).
    function getTeacherSubjectForClass(classItem, teacherId) {
      if (!classItem) return '';
      if (classItem.teacherSubjects && classItem.teacherSubjects[teacherId]) return classItem.teacherSubjects[teacherId];
      if (classItem.teacherId === teacherId) return classItem.subject || (classItem.subjects || [])[0] || '';
      return '';
    }

    const AuthContext = createContext(null);
    const NavContext = createContext(null);
    const ToastContext = createContext(null);
    const AppDataContext = createContext(null);
    const ThemeContext = createContext(null);

    function useAuth() { return useContext(AuthContext); }
    function useNav() { return useContext(NavContext); }
    function useToast() { return useContext(ToastContext); }
    function useAppData() { return useContext(AppDataContext); }
    function useTheme() { return useContext(ThemeContext); }

    function ThemeProvider({ children }) {
      const [theme, setTheme] = useState(() => db.get('vedo_theme', 'light'));
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        document.body.setAttribute('data-theme', theme);
        db.set('vedo_theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme((prev) => (prev === 'light' ? 'dark' : 'light'));
      return <ThemeContext.Provider value={{ theme, toggleTheme }}>{children}</ThemeContext.Provider>;
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, info) {
        console.error('Vedo crashed:', error, info);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#020617', color: '#e2e8f0', padding: '24px', textAlign: 'center', fontFamily: 'Inter, sans-serif' }}>
              <div style={{ fontSize: '18px', fontWeight: 700, marginBottom: '8px' }}>Something went wrong</div>
              <div style={{ fontSize: '13px', color: '#94a3b8', marginBottom: '16px', maxWidth: '480px', wordBreak: 'break-word' }}>
                {this.state.error?.message || 'Unknown error'}
              </div>
              <button
                onClick={() => { this.setState({ hasError: false, error: null }); window.location.hash = '/discover'; window.location.reload(); }}
                style={{ background: '#4f46e5', color: 'white', border: 'none', borderRadius: '999px', padding: '10px 20px', fontSize: '14px', fontWeight: 600, cursor: 'pointer' }}
              >
                Reload app
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function generateCode(length = 6) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < length; i += 1) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    function stamp() {
      return new Date().toISOString();
    }

    function safeDateText(value) {
      if (!value) return '';
      if (typeof value === 'string') return value.slice(0, 10);
      if (value && typeof value.toDate === 'function') {
        try { return value.toDate().toISOString().slice(0, 10); } catch { return ''; }
      }
      if (value && typeof value.seconds === 'number') {
        try { return new Date(value.seconds * 1000).toISOString().slice(0, 10); } catch { return ''; }
      }
      try { return new Date(value).toISOString().slice(0, 10); } catch { return ''; }
    }

    function safeSortKey(value) {
      if (!value) return 0;
      if (typeof value === 'string') {
        const t = Date.parse(value);
        return Number.isNaN(t) ? 0 : t;
      }
      if (value && typeof value.toDate === 'function') {
        try { return value.toDate().getTime(); } catch { return 0; }
      }
      if (value && typeof value.seconds === 'number') return value.seconds * 1000;
      return 0;
    }

    function dueDateUrgency(dueDate) {
      if (!dueDate) return null;
      const due = new Date(dueDate + 'T23:59:59');
      if (Number.isNaN(due.getTime())) return null;
      const diffDays = Math.ceil((due.getTime() - Date.now()) / (1000 * 60 * 60 * 24));
      if (diffDays < 0) return { label: 'Overdue', tone: 'rose' };
      if (diffDays === 0) return { label: 'Due today', tone: 'amber' };
      if (diffDays <= 2) return { label: `Due in ${diffDays}d`, tone: 'amber' };
      return { label: `Due in ${diffDays}d`, tone: 'emerald' };
    }

    const API_BASE = (window.__VEDO_BACKEND_BASE__ || '/api').replace(/\/$/, '');
    const OFFLINE_QUEUE_KEY = StorageKeys.OFFLINE;

    function queueOfflineAction(path, body) {
      try {
        const queue = db.get(OFFLINE_QUEUE_KEY, []);
        queue.push({ path, body, createdAt: stamp() });
        db.set(OFFLINE_QUEUE_KEY, queue);
      } catch (err) {
        console.warn('Failed to queue offline action', err);
      }
    }

    async function apiPost(path, body) {
      const payload = { ...body, source: 'vedo-web', timestamp: Date.now() };
      try {
        const res = await fetch(`${API_BASE}/${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const contentType = res.headers.get('content-type') || '';
        return contentType.includes('application/json') ? await res.json() : { ok: true };
      } catch (err) {
        queueOfflineAction(path, payload);
        console.warn('API POST failed; queued locally', path, err);
        return { queued: true, path };
      }
    }

    async function apiGet(path) {
      try {
        const res = await fetch(`${API_BASE}/${path}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const contentType = res.headers.get('content-type') || '';
        return contentType.includes('application/json') ? await res.json() : { ok: true };
      } catch (err) {
        console.warn('API GET failed', path, err);
        return null;
      }
    }

    function flushOfflineQueue() {
      try {
        if (!navigator.onLine) return;
        const queue = db.get(OFFLINE_QUEUE_KEY, []);
        if (!queue.length) return;
        db.set(OFFLINE_QUEUE_KEY, []);
        queue.forEach((item) => apiPost(item.path, item.body).catch(() => {}));
      } catch (err) {
        console.warn('Failed to flush offline queue', err);
      }

      (records || []).forEach((r) => {
        if (!r?.date) return;
        (byDate[r.date] ||= []).push(r);
      });
      const cells = [];
      for (let i = 0; i < startWeekday; i += 1) cells.push(null);
      for (let d = 1; d <= daysInMonth; d += 1) cells.push(d);
      const monthLabel = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const todayStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
      return (
        <div>
          <div className="mb-3 flex items-center justify-between">
            <button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="rounded-xl border border-white/10 bg-white/5 px-2.5 py-1.5 text-sm hover:bg-white/10 transition-all">‹</button>
            <div className="text-sm font-semibold text-slate-200">{monthLabel}</div>
            <button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="rounded-xl border border-white/10 bg-white/5 px-2.5 py-1.5 text-sm hover:bg-white/10 transition-all">›</button>
          </div>
          <div className="mb-1 grid grid-cols-7 gap-1 text-center text-[10px] text-slate-500">
            {['M', 'T', 'W', 'T', 'F', 'S', 'S'].map((d, i) => <div key={i}>{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {cells.map((d, idx) => {
              if (d === null) return <div key={idx}></div>;
              const dateStr = `${year}-${pad(month + 1)}-${pad(d)}`;
              const dayRecords = byDate[dateStr] || [];
              const allPresent = dayRecords.length && dayRecords.every((r) => r.present);
              const tone = !dayRecords.length ? null : allPresent ? 'emerald' : 'rose';
              const isToday = dateStr === todayStr;
              return (
                <div
                  key={idx}
                  title={dayRecords.length ? `${dayRecords.length} record${dayRecords.length === 1 ? '' : 's'} — ${allPresent ? 'Present' : 'Absent'}` : 'No class recorded'}
                  className={`flex aspect-square items-center justify-center rounded-lg border text-xs font-medium transition-all ${tone ? `border-${tone}-400/30 bg-${tone}-500/20 text-${tone}-200` : 'border-white/5 bg-white/5 text-slate-500'} ${isToday ? 'ring-2 ring-indigo-400/60' : ''}`}
                >
                  {d}
                </div>
              );
            })}
          </div>
          <div className="mt-3 flex flex-wrap items-center gap-4 text-xs text-slate-400">
            <span className="flex items-center gap-1.5"><span className="h-2.5 w-2.5 rounded-sm bg-emerald-400/60"></span>Present</span>
            <span className="flex items-center gap-1.5"><span className="h-2.5 w-2.5 rounded-sm bg-rose-400/60"></span>Absent</span>
            <span className="flex items-center gap-1.5"><span className="h-2.5 w-2.5 rounded-sm bg-white/10"></span>No class</span>
          </div>
        </div>
      );
    }

    function getVisibleAnnouncementsForProfile(profile, announcements, classes, institutes, joinRequests, users) {
      if (!profile) return [];
      const role = profile.role;
      const approvedMemberships = (joinRequests || []).filter((r) => r.requesterId === profile.id && r.status === 'approved');
      const classIds = new Set();
      const instituteIds = new Set();
      const studentIds = new Set([profile.id]);

      if (role === 'student') {
        (classes || []).forEach((c) => {
          const has = c.studentIds?.includes(profile.id) || (profile.classIds || []).includes(c.id) || approvedMemberships.some((r) => r.targetType === 'class' && r.targetId === c.id);
          if (has) classIds.add(c.id);
        });
        (institutes || []).forEach((i) => {
          const has = i.studentIds?.includes(profile.id) || (profile.instituteIds || []).includes(i.id) || approvedMemberships.some((r) => r.targetType === 'institute' && r.targetId === i.id);
          if (has) instituteIds.add(i.id);
        });
      } else if (role === 'teacher') {
        (classes || []).forEach((c) => {
          const inst = (institutes || []).find((i) => i.id === c.instituteId);
          const isAssigned = c.teacherId === profile.id || c.teacherIds?.includes(profile.id) || c.ownerId === profile.id;
          const instTeacherMatch = !!inst && (inst.teacherIds?.includes(profile.id) || inst.ownerId === profile.id);
          const approvedClass = approvedMemberships.some((r) => r.targetType === 'class' && r.targetId === c.id);
          const approvedInst = approvedMemberships.some((r) => r.targetType === 'institute' && r.targetId === c.instituteId);
          const profileClassAccess = (profile.classIds || []).includes(c.id);
          const profileInstAccess = (profile.instituteIds || []).includes(c.instituteId);
          if (isAssigned || instTeacherMatch || approvedClass || approvedInst || profileClassAccess || profileInstAccess) classIds.add(c.id);
        });
        (institutes || []).forEach((i) => {
          const has = i.teacherIds?.includes(profile.id) || approvedMemberships.some((r) => r.targetType === 'institute' && r.targetId === i.id) || (profile.instituteIds || []).includes(i.id);
          if (has) instituteIds.add(i.id);
        });
      } else if (role === 'owner') {
        (institutes || []).forEach((i) => { if (i.ownerId === profile.id) instituteIds.add(i.id); });
        (classes || []).forEach((c) => { if (c.ownerId === profile.id) classIds.add(c.id); });
      } else if (role === 'parent') {
        const myRecord = (users || []).find((u) => u.id === profile.id) || profile;
        (myRecord.linkedChildren || []).forEach((child) => studentIds.add(child.id));
        const childIds = Array.from(studentIds).filter((id) => id !== profile.id);
        const childRecords = childIds.map((id) => (users || []).find((u) => u.id === id)).filter(Boolean);
        (classes || []).forEach((c) => {
          const has = childIds.some((id) => c.studentIds?.includes(id)) || childRecords.some((cr) => (cr.classIds || []).includes(c.id));
          if (has) classIds.add(c.id);
        });
        (institutes || []).forEach((i) => {
          const has = childIds.some((id) => i.studentIds?.includes(id)) || childRecords.some((cr) => (cr.instituteIds || []).includes(i.id));
          if (has) instituteIds.add(i.id);
        });
      }

      return (announcements || []).filter((item) => {
        if (!item) return false;
        if (item.studentId) return studentIds.has(item.studentId);
        if (item.classId) return classIds.has(item.classId);
        if (item.instituteId) return instituteIds.has(item.instituteId);
        return false;
      });
    }

    function NotificationBell() {
      const { profile } = useAuth();
      const { announcements, classes, institutes, joinRequests, users } = useAppData();
      const [open, setOpen] = useState(false);
      const [lastSeen, setLastSeen] = useState(() => Number(db.get('vedo_notifs_seen', 0)) || 0);

      const relevant = useMemo(() => {
        return getVisibleAnnouncementsForProfile(profile, announcements, classes, institutes, joinRequests, users)
          .slice()
          .sort((a, b) => safeSortKey(b.createdAt) - safeSortKey(a.createdAt))
          .slice(0, 8);
      }, [announcements, classes, institutes, joinRequests, users, profile]);

      const unreadCount = relevant.filter((item) => safeSortKey(item.createdAt) > lastSeen).length;

      const openPanel = () => {
        const willOpen = !open;
        setOpen(willOpen);
        if (willOpen) {
          const now = Date.now();
          setLastSeen(now);
          db.set('vedo_notifs_seen', now);
        }
      };

      return (
        <div className="relative">
          <button onClick={openPanel} aria-label="Notifications" className="relative rounded-xl border border-white/10 bg-white/5 p-2.5 text-slate-100 card-hover hover:bg-white/10 transition-all">
            <span className="text-sm">🔔</span>
            {unreadCount > 0 && <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full animate-pulse2"></span>}
          </button>
          {open && (
            <div className="absolute right-0 top-12 w-72 max-w-[85vw] rounded-2xl border border-white/10 bg-slate-900 shadow-2xl z-50 overflow-hidden animate-slide-in">
              <div className="px-4 py-2.5 border-b border-white/10 flex justify-between items-center">
                <span className="text-xs font-bold">Notifications</span>
                <button onClick={() => setOpen(false)} className="text-[10px] text-indigo-400 hover:underline">Close</button>
              </div>
              <div className="max-h-72 overflow-y-auto">
                {relevant.length ? relevant.map((n) => (
                  <div key={n.id} className="px-4 py-2.5 hover:bg-white/5 transition-colors border-b border-white/5 flex items-start gap-2">
                    <span className="text-base">📢</span>
                    <div className="min-w-0">
                      <p className="text-[11px] text-slate-200 leading-snug">{n.title || n.text || n.message}</p>
                      <span className="text-[9px] text-slate-500 mt-0.5 block">{safeDateText(n.createdAt)}</span>
                    </div>
                  </div>
                )) : <div className="px-4 py-6 text-center text-xs text-slate-500">No notifications yet.</div>}
              </div>
            </div>
          )}
        </div>
      );
    }
    function NotificationTopBanner() {
      const { profile } = useAuth();
      const { announcements, classes, institutes, joinRequests, users } = useAppData();
      const [queue, setQueue] = useState([]);
      const [dragX, setDragX] = useState(0);
      const [dragging, setDragging] = useState(false);
      const startX = useRef(0);
      const seenKey = profile?.id ? `vedo_popup_seen_${profile.id}` : null;

      useEffect(() => {
        if (!profile || !seenKey) return;
        const seenIds = new Set(db.get(seenKey, []));
        const relevant = getVisibleAnnouncementsForProfile(profile, announcements, classes, institutes, joinRequests, users)
          .filter((item) => !seenIds.has(item.id))
          .sort((a, b) => safeSortKey(a.createdAt) - safeSortKey(b.createdAt));
        setQueue(relevant);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [profile?.id]);

      if (!queue.length) return null;
      const current = queue[0];

      const markSeenAndAdvance = () => {
        if (seenKey) {
          const seenIds = db.get(seenKey, []);
          if (!seenIds.includes(current.id)) db.set(seenKey, [...seenIds, current.id]);
        }
        setQueue((prev) => prev.slice(1));
        setDragX(0);
      };

      const posX = (e) => (e.touches ? e.touches[0].clientX : e.clientX);
      const onDown = (e) => { setDragging(true); startX.current = posX(e); };
      // Right swipe only — dismisses like a phone notification.
      const onMove = (e) => { if (dragging) setDragX(Math.max(0, posX(e) - startX.current)); };
      const onUp = () => {
        setDragging(false);
        if (dragX > 80) markSeenAndAdvance();
        else setDragX(0);
      };

      const iconFor = (t) => {
        const s = (t || '').toLowerCase();
        if (s.includes('fee')) return '💰';
        if (s.includes('homework')) return '📝';
        if (s.includes('test')) return '📊';
        if (s.includes('doubt') || s.includes('reply')) return '🤖';
        if (s.includes('timetable')) return '🗓️';
        if (s.includes('feedback')) return '💬';
        if (s.includes('approved')) return '🎉';
        if (s.includes('syllabus')) return '📘';
        return '📢';
      };

      return (
        <div className="pointer-events-none fixed left-0 right-0 z-[70] flex justify-center px-3" style={{ top: 'calc(env(safe-area-inset-top) + 70px)' }}>
          <div
            className="pointer-events-auto w-full max-w-sm select-none overflow-hidden rounded-2xl border border-white/10 bg-slate-900/95 shadow-2xl backdrop-blur"
            style={{ transform: `translateX(${dragX}px)`, opacity: 1 - Math.min(dragX / 220, 0.85), transition: dragging ? 'none' : 'transform .25s ease, opacity .25s ease' }}
            onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={() => dragging && onUp()}
            onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
          >
            <div className="flex items-start gap-3 px-4 py-3">
              <span className="text-xl leading-none">{iconFor(current.title)}</span>
              <div className="min-w-0 flex-1">
                <h4 className="truncate text-sm font-semibold text-slate-100">{current.title}</h4>
                <p className="mt-0.5 line-clamp-2 text-xs text-slate-400">{current.message}</p>
              </div>
              <button onClick={markSeenAndAdvance} aria-label="Dismiss notification" className="flex-none rounded-lg border border-white/10 px-2 py-1 text-xs text-slate-300">✕</button>
            </div>
            <div className="flex items-center justify-between px-4 pb-2.5">
              <span className="text-[10px] text-slate-500">{queue.length > 1 ? `+${queue.length - 1} more • ` : ''}swipe right to dismiss</span>
              <div className="flex gap-1">
                {queue.slice(0, 5).map((_, idx) => <span key={idx} className={`h-1 rounded-full ${idx === 0 ? 'w-5 bg-indigo-400' : 'w-1 bg-white/20'}`}></span>)}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Reusable subject list "chip" builder used by owner/teacher class-creation forms.
    function SubjectListBuilder({ subjects, onChange }) {
      const [draft, setDraft] = useState('');
      const add = () => {
        const clean = draft.trim();
        if (!clean || subjects.includes(clean)) return;
        onChange([...subjects, clean]);
        setDraft('');
      };
      const remove = (s) => onChange(subjects.filter((item) => item !== s));
      return (
        <div>
          <div className="flex gap-2">
            <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); add(); } }} placeholder="Subject name (e.g. Physics)" className="flex-1 rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
            <button type="button" onClick={add} className="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold hover:bg-indigo-500 transition-all">Add</button>
          </div>
          {subjects.length ? (
            <div className="mt-2 flex flex-wrap gap-2">
              {subjects.map((s) => (
                <span key={s} className="inline-flex items-center gap-1.5 rounded-full bg-indigo-500/10 border border-indigo-400/30 px-3 py-1 text-xs font-semibold text-indigo-200">
                  {s}
                  <button type="button" onClick={() => remove(s)} className="text-indigo-300 hover:text-white">✕</button>
                </span>
              ))}
            </div>
          ) : <div className="mt-2 text-xs text-slate-500">Add at least one subject.</div>}
        </div>
      );
    }

    // Read-only chapter progress bar for a single class × subject, used on
    // the Student and Parent dashboards.
    function SyllabusProgress({ classId, subject, syllabi }) {
      const doc = syllabi.find((s) => s.classId === classId && s.subject === subject);
      const chapters = doc?.chapters || [];
      const doneCount = chapters.filter((c) => c.completed).length;
      const pct = chapters.length ? Math.round((doneCount / chapters.length) * 100) : 0;
      return (
        <div className="rounded-2xl border border-white/10 bg-slate-900/70 p-3">
          <div className="flex items-center justify-between text-sm">
            <span className="font-medium text-slate-100">{subject}</span>
            <span className="text-slate-400">{doneCount}/{chapters.length} chapters</span>
          </div>
          <div className="mt-2 h-2 w-full overflow-hidden rounded-full bg-white/10">
            <div className="h-full rounded-full bg-indigo-400" style={{ width: `${pct}%` }}></div>
          </div>
        </div>
      );
    }

                    <button onClick={handleEnableNotifications} disabled={notifBusy || notifStatus === 'granted' || notifStatus === 'denied' || notifStatus === 'unsupported'} className={`w-full rounded-2xl border px-3 py-3 text-left text-sm card-hover transition-all disabled:cursor-default ${notifStatus === 'granted' ? 'border-emerald-400/20 bg-emerald-500/10 text-emerald-200' : notifStatus === 'denied' || notifStatus === 'unsupported' ? 'border-white/10 bg-white/5 text-slate-400' : 'border-white/10 bg-white/5 hover:bg-white/10'}`}>{notifBusy ? '⏳ Requesting permission...' : notifLabel}</button>
                    <button onClick={toggleTheme} className="w-full rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-left text-sm card-hover hover:bg-white/10 transition-all">{theme === 'light' ? '🌙 Switch to dark mode' : '☀️ Switch to light mode'}</button>
                    <button onClick={() => { setMenuOpen(false); navigateTo('/discover'); }} className="w-full rounded-2xl border border-indigo-400/20 bg-indigo-500/10 px-3 py-3 text-left text-sm font-medium text-indigo-200 card-hover hover:bg-indigo-500/20 transition-all">🔍 Explore institutes, teachers &amp; classes</button>
                  </div>
                </div>

                <div className="flex-none pt-4">
                  {profile ? (
                    <button onClick={() => { setMenuOpen(false); logout(); }} className="w-full rounded-2xl bg-rose-500 px-3 py-3 text-sm font-semibold text-white hover:bg-rose-400 transition-all">Logout</button>
                  ) : (
                    <button onClick={() => { setMenuOpen(false); navigateTo('/discover'); }} className={`w-full rounded-2xl bg-${accent}-600 px-3 py-3 text-sm font-semibold text-white hover:bg-${accent}-500 transition-all`}>Login</button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function DiscoverScreen() {
      const { profile } = useAuth();
      const { navigateTo } = useNav();
      const { addToast } = useToast();
      const { institutes, classes, users } = useAppData();
      const [selectedInstitute, setSelectedInstitute] = useState(null);
      const [selectedTeacher, setSelectedTeacher] = useState(null);
      const [selectedBatch, setSelectedBatch] = useState(null);
      const [query, setQuery] = useState('');
      const [activeTab, setActiveTab] = useState('all');
      const [showAuth, setShowAuth] = useState(false);

      useEffect(() => {
        if (profile) setShowAuth(false);
      }, [profile]);

      const teacherUsers = useMemo(() => users.filter((item) => item.role === 'teacher'), [users]);
      const instituteMap = useMemo(() => Object.fromEntries(institutes.map((item) => [item.id, item])), [institutes]);

      const SUBJECT_THEME = {
        mathematics: { grad: 'from-indigo-500 to-blue-500', chip: 'bg-indigo-500/15 text-indigo-200 border-indigo-400/30', dot: 'bg-indigo-400' },
        math: { grad: 'from-indigo-500 to-blue-500', chip: 'bg-indigo-500/15 text-indigo-200 border-indigo-400/30', dot: 'bg-indigo-400' },
        physics: { grad: 'from-sky-500 to-cyan-500', chip: 'bg-sky-500/15 text-sky-200 border-sky-400/30', dot: 'bg-sky-400' },
        chemistry: { grad: 'from-fuchsia-500 to-purple-500', chip: 'bg-fuchsia-500/15 text-fuchsia-200 border-fuchsia-400/30', dot: 'bg-fuchsia-400' },
        biology: { grad: 'from-emerald-500 to-teal-500', chip: 'bg-emerald-500/15 text-emerald-200 border-emerald-400/30', dot: 'bg-emerald-400' },
        english: { grad: 'from-amber-500 to-yellow-500', chip: 'bg-amber-500/15 text-amber-200 border-amber-400/30', dot: 'bg-amber-400' },
        science: { grad: 'from-teal-500 to-cyan-500', chip: 'bg-teal-500/15 text-teal-200 border-teal-400/30', dot: 'bg-teal-400' },
        commerce: { grad: 'from-orange-500 to-amber-500', chip: 'bg-orange-500/15 text-orange-200 border-orange-400/30', dot: 'bg-orange-400' },
        computer: { grad: 'from-violet-500 to-purple-500', chip: 'bg-violet-500/15 text-violet-200 border-violet-400/30', dot: 'bg-violet-400' },
      };
      const getSubjectTheme = (subject) => {
        const key = (subject || '').toLowerCase();
        const found = Object.keys(SUBJECT_THEME).find((k) => key.includes(k));
        return SUBJECT_THEME[found] || { grad: 'from-rose-500 to-pink-500', chip: 'bg-rose-500/15 text-rose-200 border-rose-400/30', dot: 'bg-rose-400' };
      };

      const q = query.trim().toLowerCase();
      const matches = (text) => !q || String(text || '').toLowerCase().includes(q);

      const filteredInstitutes = institutes.filter((item) => matches(item.name) || matches(item.city) || matches(item.description) || matches(item.code));
      const filteredClasses = classes.filter((item) => {
        const inst = instituteMap[item.instituteId];
        return matches(item.name) || matches(item.subject) || matches((item.subjects || []).join(' ')) || matches(item.teacherName) || matches(item.code) || matches(inst?.name) || matches(inst?.city);
      });
      const filteredTeachers = teacherUsers.filter((item) => matches(item.name) || matches(item.email));

      const noResults = q && filteredInstitutes.length === 0 && filteredClasses.length === 0 && filteredTeachers.length === 0;

      const showInstitutes = activeTab === 'all' || activeTab === 'institutes';
      const showBatches = activeTab === 'all' || activeTab === 'batches';
      const showTeachers = activeTab === 'all' || activeTab === 'teachers';

      const handleInstituteAction = (institute) => {
        if (!profile) {
          setSelectedInstitute(institute);
          setShowAuth(true);
          addToast('Login to view full institute details', 'error');
          return;
        }
        setSelectedInstitute(institute);
      };

      const handleTeacherAction = (teacher) => {
        if (!profile) {
          setSelectedTeacher(teacher);
          setShowAuth(true);
          addToast('Login to view teacher details', 'error');
          return;
        }
        setSelectedTeacher(teacher);
      };

      const tabPills = [
        { id: 'all', label: 'Everything', icon: '✨' },
        { id: 'institutes', label: 'Institutes', icon: '🏫' },
        { id: 'batches', label: 'Batches & classes', icon: '📚' },
        { id: 'teachers', label: 'Teachers', icon: '👩‍🏫' },
      ];

      const PREVIEW_COUNT = 6;
      const previewInstitutes = activeTab === 'all' ? filteredInstitutes.slice(0, PREVIEW_COUNT) : filteredInstitutes;
      const previewClasses = activeTab === 'all' ? filteredClasses.slice(0, PREVIEW_COUNT) : filteredClasses;
      const previewTeachers = activeTab === 'all' ? filteredTeachers.slice(0, PREVIEW_COUNT) : filteredTeachers;

      return (
        <div className="h-[100dvh] overflow-y-auto discover-bg text-slate-100">
          <div className="mx-auto flex max-w-7xl flex-col gap-5 px-4 py-4 sm:px-6 sm:py-6 lg:px-8">

            <div className="flex items-center justify-between gap-3">
              <div className="flex items-center gap-2">
                <span className="text-xl font-black gradient-text sm:text-2xl">Vedo</span>
              </div>
              {profile ? (
                <button onClick={() => navigateTo(`/${profile.role}`)} className="flex-none rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-2.5 text-sm font-semibold text-white shadow-lg hover:brightness-110 transition-all">
                  My dashboard
                </button>
              ) : (
                <button onClick={() => setShowAuth(true)} className="flex-none rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-2.5 text-sm font-semibold text-white shadow-lg hover:brightness-110 transition-all">
                  Login
                </button>
              )}
            </div>

            <div className="hero-card rounded-[28px] border border-white/10 p-5 shadow-2xl relative overflow-hidden sm:p-6">
              <div className="blob blob-a"></div>
              <div className="blob blob-b"></div>
              <div className="blob blob-c"></div>
              <div className="relative space-y-4">
                <h1 className="max-w-xl text-2xl font-black leading-snug sm:text-3xl">
                  <span className="rainbow-text">Discover institutes, batches &amp; teachers</span>
                </h1>

                <div className="relative max-w-xl">
                  <div className="flex items-center gap-2 rounded-2xl border-2 border-white/15 bg-white/10 px-4 py-3 backdrop-blur focus-within:border-amber-300/70 transition-all">
                    <span className="text-lg">🔍</span>
                    <input
                      type="text"
                      value={query}
                      onChange={(event) => setQuery(event.target.value)}
                      placeholder="Search institute, city, batch, subject or teacher..."
                      className="w-full bg-transparent text-sm text-white placeholder-slate-400 outline-none"
                    />
                    {query && (
                      <button onClick={() => setQuery('')} className="text-slate-400 hover:text-white text-sm">✕</button>
                    )}
                  </div>
                </div>

                <div className="flex flex-wrap gap-2">
                  {tabPills.map((tab) => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`pill-btn ${activeTab === tab.id ? 'pill-btn-active' : ''}`}
                    >{tab.icon} {tab.label}</button>
                  ))}
                </div>
              </div>
            </div>

            {showAuth && (
              <div className="fixed inset-0 z-[110] flex items-start justify-center overflow-y-auto bg-slate-950/70 px-4 py-6 sm:items-center" onClick={() => setShowAuth(false)}>
                <div className="w-full max-w-sm rounded-[28px] border border-white/10 bg-slate-900/95 p-6 shadow-2xl animate-fade-in" onClick={(event) => event.stopPropagation()}>
                  <div className="flex items-center justify-between">
                    <div><span className="text-xl font-black gradient-text">Vedo</span><p className="text-xs text-slate-400">Virtual Education Desk Operator</p></div>
                    <button onClick={() => setShowAuth(false)} aria-label="Close login" className="rounded-xl border border-white/10 px-2.5 py-1.5 text-sm text-slate-300 transition-all">✕</button>
                  </div>
                  <div className="mt-4"><AuthScreen compact /></div>
                </div>
              </div>
            )}

            {noResults && (
              <div className="glass rounded-3xl border border-white/10 p-8 text-center text-slate-400">
                <span className="text-3xl block mb-2">🔎</span>
                No institutes, batches or teachers match &ldquo;{query}&rdquo;. Try another search term.
              </div>
            )}

            {showInstitutes && (
              <div className="space-y-3">
                <h3 className="text-lg font-bold flex items-center gap-2">🏫 Institutes <span className="text-sm font-medium text-slate-400">({filteredInstitutes.length})</span></h3>
                {filteredInstitutes.length === 0 ? (
                  <div className="glass rounded-3xl border border-white/10 p-6 text-sm text-slate-400">No institutes to show yet.</div>
                ) : (
                  <div className="-mx-4 flex snap-x snap-mandatory gap-3 overflow-x-auto px-4 pb-2 sm:-mx-6 sm:px-6">
                    {previewInstitutes.map((item) => {
                      const instBatches = classes.filter((classItem) => classItem.instituteId === item.id);
                      return (
                        <div key={item.id} className="w-[250px] flex-none snap-start glass rounded-3xl border border-white/10 p-4 card-hover institute-card">
                          <div className="flex items-start justify-between gap-2">
                            <div className="min-w-0">
                              <h3 className="truncate text-base font-semibold">{item.name}</h3>
                              <p className="mt-0.5 text-xs text-slate-400">📍 {item.city}</p>
                            </div>
                            <span className="flex-none rounded-lg bg-indigo-500/15 border border-indigo-400/30 px-2 py-0.5 text-[10px] font-bold text-indigo-200">{instBatches.length} batches</span>
                          </div>
                          <div className="mt-3 flex items-center justify-between">
                            <span className="text-[10px] uppercase tracking-[0.2em] text-slate-500">Code {item.code}</span>
                            <button onClick={() => handleInstituteAction(item)} className="rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-3 py-1.5 text-xs font-semibold text-white hover:brightness-110 transition-all">View</button>
                          </div>
                        </div>
                      );
                    })}
                    {activeTab === 'all' && filteredInstitutes.length > PREVIEW_COUNT && (
                      <button onClick={() => setActiveTab('institutes')} className="flex w-[140px] flex-none snap-start flex-col items-center justify-center gap-2 rounded-3xl border border-dashed border-indigo-400/30 bg-indigo-500/5 p-4 text-center card-hover hover:bg-indigo-500/10 transition-all">
                        <span className="text-xl">➜</span>
                        <span className="text-xs font-semibold text-indigo-200">Explore all institutes</span>
                      </button>
                    )}
                  </div>
                )}
              </div>
            )}

            {showBatches && (
              <div className="space-y-3">
                <h3 className="text-lg font-bold flex items-center gap-2">📚 Batches &amp; classes <span className="text-sm font-medium text-slate-400">({filteredClasses.length})</span></h3>
                {filteredClasses.length === 0 ? (
                  <div className="glass rounded-3xl border border-white/10 p-6 text-sm text-slate-400">No batches to show yet.</div>
                ) : (
                  <div className="-mx-4 flex snap-x snap-mandatory gap-3 overflow-x-auto px-4 pb-2 sm:-mx-6 sm:px-6">
                    {previewClasses.map((item) => {
                      const theme = getSubjectTheme(item.subject);
                      const inst = instituteMap[item.instituteId];
                      const subjectList = item.subjects && item.subjects.length ? item.subjects : (item.subject ? [item.subject] : []);
                      return (
                        <button
                          key={item.id}
                          onClick={() => setSelectedBatch(item)}
                          className="w-[230px] flex-none snap-start text-left glass rounded-3xl border border-white/10 p-4 card-hover overflow-hidden relative"
                        >
                          <div className={`absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r ${theme.grad}`}></div>
                          <div className="flex items-start justify-between gap-2">
                            <h4 className="truncate text-sm font-bold">{item.name}</h4>
                            <span className={`flex-none rounded-lg border px-1.5 py-0.5 text-[9px] font-bold uppercase tracking-wide ${theme.chip}`}>{subjectList[0] || 'General'}</span>
                          </div>
                          {subjectList.length > 1 ? <p className="mt-1 truncate text-[10px] text-slate-500">+{subjectList.length - 1} more subject{subjectList.length - 1 > 1 ? 's' : ''}</p> : null}
                          <p className="mt-1 truncate text-xs text-slate-400">{inst ? `🏫 ${inst.name}` : 'Independent batch'}</p>
                          <div className="mt-3 flex items-center justify-between text-sm">
                            <span className="text-xs text-slate-400">{item.schedule || 'Weekly'}</span>
                            <span className="font-black text-emerald-300">₹{item.fee}</span>
                          </div>
                        </button>
                      );
                    })}
                    {activeTab === 'all' && filteredClasses.length > PREVIEW_COUNT && (
                      <button onClick={() => setActiveTab('batches')} className="flex w-[140px] flex-none snap-start flex-col items-center justify-center gap-2 rounded-3xl border border-dashed border-emerald-400/30 bg-emerald-500/5 p-4 text-center card-hover hover:bg-emerald-500/10 transition-all">
                        <span className="text-xl">➜</span>
                        <span className="text-xs font-semibold text-emerald-200">Explore all batches</span>
                      </button>
                    )}
                  </div>
                )}
              </div>
            )}

            {showTeachers && (
              <div className="space-y-3">
                <h3 className="text-lg font-bold flex items-center gap-2">👩‍🏫 Teachers <span className="text-sm font-medium text-slate-400">({filteredTeachers.length})</span></h3>
                {filteredTeachers.length === 0 ? (
                  <div className="glass rounded-3xl border border-white/10 p-6 text-sm text-slate-400">No teachers to show yet.</div>
                ) : (
                  <div className="-mx-4 flex snap-x snap-mandatory gap-3 overflow-x-auto px-4 pb-2 sm:-mx-6 sm:px-6">
                    {previewTeachers.map((teacher, index) => {
                      const palette = ['from-emerald-500 to-teal-500', 'from-indigo-500 to-blue-500', 'from-fuchsia-500 to-purple-500', 'from-amber-500 to-orange-500', 'from-sky-500 to-cyan-500'];
                      const grad = palette[index % palette.length];
                      return (
                        <div key={teacher.id} className="w-[210px] flex-none snap-start rounded-2xl border border-white/10 bg-slate-900/70 p-4 card-hover text-center">
                          <div className={`mx-auto w-12 h-12 shrink-0 rounded-2xl bg-gradient-to-br ${grad} flex items-center justify-center font-black text-white text-sm`}>
                            {(teacher.name || teacher.email || '?').slice(0, 2).toUpperCase()}
                          </div>
                          <div className="mt-2 min-w-0">
                            <div className="truncate font-semibold">{teacher.name}</div>
                            <div className="truncate text-xs text-slate-400">{teacher.email}</div>
                          </div>
                          <button onClick={() => handleTeacherAction(teacher)} className="mt-3 w-full rounded-xl bg-gradient-to-r from-emerald-600 to-teal-600 px-3 py-1.5 text-xs font-semibold text-white hover:brightness-110 transition-all">View profile</button>
                        </div>
                      );
                    })}
                    {activeTab === 'all' && filteredTeachers.length > PREVIEW_COUNT && (
                      <button onClick={() => setActiveTab('teachers')} className="flex w-[140px] flex-none snap-start flex-col items-center justify-center gap-2 rounded-3xl border border-dashed border-amber-400/30 bg-amber-500/5 p-4 text-center card-hover hover:bg-amber-500/10 transition-all">
                        <span className="text-xl">➜</span>
                        <span className="text-xs font-semibold text-amber-200">Explore all teachers</span>
                      </button>
                    )}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'all' && (
              <div className="grid gap-3 md:grid-cols-3">
                <div className="stat-card stat-indigo">
                  <div className="text-sm opacity-80">🏫 Institutes</div>
                  <div className="mt-2 text-3xl font-black">{institutes.length}</div>
                </div>
                <div className="stat-card stat-emerald">
                  <div className="text-sm opacity-80">📚 Batches &amp; classes</div>
                  <div className="mt-2 text-3xl font-black">{classes.length}</div>
                </div>
                <div className="stat-card stat-amber">
                  <div className="text-sm opacity-80">👩‍🏫 Teachers</div>
                  <div className="mt-2 text-3xl font-black">{teacherUsers.length}</div>
                </div>
              </div>
            )}

            {activeTab === 'all' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">How it works</h3>
                <div className="mt-4 grid gap-3 sm:grid-cols-2">
                  {[
                    ['🏢', 'Owner controls', 'Create institutes, approve student and teacher requests, send notifications and manage batches.', 'from-violet-500/15 to-indigo-500/10 border-violet-400/20'],
                    ['👩‍🏫', 'Teacher workflow', 'Create and teach individual classes, post notes, assign homework, solve doubts and give feedback.', 'from-emerald-500/15 to-teal-500/10 border-emerald-400/20'],
                    ['🎓', 'Student journey', 'Join a class or institute by code, track fees, view schedule, submit homework and see marks.', 'from-sky-500/15 to-cyan-500/10 border-sky-400/20'],
                    ['👨‍👩‍👧', 'Parent journey', "Link to your child's account using their email and unique parent code, then follow marks, attendance, fees and feedback.", 'from-amber-500/15 to-orange-500/10 border-amber-400/20'],
                  ].map(([icon, title, text, tint]) => (
                    <div key={title} className={`rounded-2xl border p-4 bg-gradient-to-br ${tint} card-hover`}>
                      <div className="flex items-center gap-2">
                        <span className="text-xl">{icon}</span>
                        <h4 className="font-bold">{title}</h4>
                      </div>
                      <p className="mt-1.5 text-sm text-slate-300">{text}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {selectedInstitute && (
            <div className="fixed inset-0 z-[90] flex items-center justify-center bg-slate-950/70 px-4 py-6">
              <div className="w-full max-w-md rounded-[28px] border border-white/10 bg-slate-900/95 p-5 shadow-2xl">
                <div className="flex items-start justify-between gap-3">
                  <div>
                    <h3 className="text-xl font-semibold">{selectedInstitute.name}</h3>
                    <p className="mt-1 text-sm text-slate-400">📍 {selectedInstitute.city}</p>
                  </div>
                  <button onClick={() => setSelectedInstitute(null)} className="rounded-xl border border-white/10 px-3 py-2 text-sm text-slate-300 transition-all">✕</button>
                </div>
                <div className="mt-4 space-y-3 text-sm text-slate-400">
                  <p>{selectedInstitute.description}</p>
                  <p>Institute code: <span className="text-indigo-300 font-semibold">{selectedInstitute.code}</span></p>
                  <p>Owner: {selectedInstitute.ownerName}</p>
                </div>
                {profile ? (
                  <div className="mt-5 flex gap-2">
                    <button onClick={() => navigateTo('/student')} className="flex-1 rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-3 py-2 text-sm font-medium text-white hover:brightness-110 transition-all">Open dashboard</button>
                    <button onClick={() => setSelectedInstitute(null)} className="flex-1 rounded-xl border border-white/10 px-3 py-2 text-sm font-medium text-slate-300 transition-all">Close</button>
                  </div>
                ) : (
                  <div className="mt-5 space-y-3">
                    <p className="text-sm text-slate-400">Login or create an account to open full institute details and join classes.</p>
                    <button onClick={() => setShowAuth(true)} className="w-full rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-3 py-2 text-sm font-medium text-white hover:brightness-110 transition-all">Login / sign up</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {selectedBatch && (() => {
            const theme = getSubjectTheme(selectedBatch.subject);
            const subjectList = selectedBatch.subjects && selectedBatch.subjects.length ? selectedBatch.subjects : (selectedBatch.subject ? [selectedBatch.subject] : []);
            return (
              <div className="fixed inset-0 z-[90] flex items-center justify-center bg-slate-950/70 px-4 py-6">
                <div className="w-full max-w-md rounded-[28px] border border-white/10 bg-slate-900/95 shadow-2xl overflow-hidden">
                  <div className={`bg-gradient-to-br ${theme.grad} p-5 text-white`}>
                    <div className="flex items-start justify-between gap-3">
                      <div>
                        <h3 className="text-xl font-semibold">{selectedBatch.name}</h3>
                        <p className="mt-1 text-sm text-white/80">{subjectList.join(', ') || 'General'} • {selectedBatch.schedule || 'Weekly'}</p>
                      </div>
                      <button onClick={() => setSelectedBatch(null)} className="rounded-xl border border-white/30 px-3 py-2 text-sm text-white transition-all">✕</button>
                    </div>
                    <div className="mt-4 rounded-xl bg-white/15 px-4 py-3 text-center">
                      <p className="text-xs text-white/80">Monthly fee</p>
                      <p className="text-2xl font-semibold">₹{selectedBatch.fee}</p>
                    </div>
                  </div>
                  <div className="p-5 space-y-3 text-sm text-slate-400">
                    {selectedBatch.description ? <p>{selectedBatch.description}</p> : null}
                    {selectedBatch.teacherName ? <p>Taught by: <span className="text-slate-200 font-semibold">{selectedBatch.teacherName}</span></p> : null}
                    <p>Batch code: <span className="text-slate-200 font-semibold">{selectedBatch.code}</span></p>
                    {profile ? (
                      <div className="mt-2 flex gap-2">
                        <button onClick={() => navigateTo('/student')} className={`flex-1 rounded-xl bg-gradient-to-r ${theme.grad} px-3 py-2 text-sm font-medium text-white hover:brightness-110 transition-all`}>Open dashboard</button>
                        <button onClick={() => setSelectedBatch(null)} className="flex-1 rounded-xl border border-white/10 px-3 py-2 text-sm font-medium text-slate-300 transition-all">Close</button>
                      </div>
                    ) : (
                      <div className="mt-2 space-y-3">

        event.preventDefault();
        setMessage('');

        if (mode === 'login') {

            setMessage(result.message);
            addToast(result.message, 'error');
          } else {
            addToast('Signed in successfully', 'success');
          }
        } else {
          const result = await signup({ email, password, role, name, instituteName, city });

            setMessage(result.message);
            addToast(result.message, 'error');

            addToast('Account created successfully', 'success');

        setBusy(false);

      // Signup tab → Google button. Opens popup, then either logs the
      // person in directly (if they already exist) or shows the

      const handleGoogleSignup = async () => {
        setMessage('');
        setBusy(true);

        if (request.targetType === 'class') {
          const cls = classes.find((item) => item.id === request.targetId);

        }

          const inst = institutes.find((item) => item.id === request.targetId);
          return inst ? users.find((item) => item.id === inst.ownerId) : null;
        }
        return null;
      };

        if (!contact) return 'Approval contact will review this request soon.';

      const visibleInstitutes = institutes.filter((item) => item.studentIds?.includes(profile?.id) || item.teacherIds?.includes(profile?.id) || approvedMemberships.some((req) => req.targetType === 'institute' && req.targetId === item.id) || (profile?.instituteIds || []).includes(item.id));
      const visibleClasses = classes.filter((item) => item.studentIds?.includes(profile?.id) || item.teacherIds?.includes(profile?.id) || approvedMemberships.some((req) => req.targetType === 'class' && req.targetId === item.id) || (profile?.classIds || []).includes(item.id));
      const visibleNotes = notes.filter((item) => visibleClasses.some((cls) => cls.id === item.classId) || visibleInstitutes.some((inst) => inst.id === item.instituteId));
      const visibleAnnouncements = announcements.filter((item) => {
        if (item.studentId) return item.studentId === profile?.id;
        if (item.classId) return visibleClasses.some((cls) => cls.id === item.classId);
        if (item.instituteId) return visibleInstitutes.some((inst) => inst.id === item.instituteId);
        return false;
      });
      const getInstituteName = (id) => institutes.find((item) => item.id === id)?.name || 'Institute';

      const dayOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      const myTimetable = schedules.filter((item) => visibleClasses.some((cls) => cls.id === item.classId) || visibleInstitutes.some((inst) => inst.id === item.instituteId)).sort((a, b) => dayOrder.indexOf(a.day) - dayOrder.indexOf(b.day) || (a.time || '').localeCompare(b.time || ''));
      const myTests = tests.filter((item) => visibleClasses.some((cls) => cls.id === item.classId) || visibleInstitutes.some((inst) => inst.id === item.instituteId)).sort((a, b) => (a.dueDate || '').localeCompare(b.dueDate || ''));

    function ParentDashboard() {
      const { profile } = useAuth();
      const { users, classes, institutes, fees, marks, attendances, feedbacks, doubts, schedules, tests, homeworks, announcements, syllabi, updateFee, linkChildToParent, unlinkChild } = useAppData();
      const { addToast } = useToast();
      const [activeTab, setActiveTab] = useState('marks');
      const [childEmail, setChildEmail] = useState('');
      const [parentCodeInput, setParentCodeInput] = useState('');
      const [selectedChildId, setSelectedChildId] = useState('');

      const myRecord = users.find((item) => item.id === profile?.id) || profile;
      const linkedChildren = myRecord?.linkedChildren || [];

      useEffect(() => {
        if (linkedChildren.length && !linkedChildren.some((child) => child.id === selectedChildId)) {
          setSelectedChildId(linkedChildren[0].id);
        }
        if (!linkedChildren.length && selectedChildId) setSelectedChildId('');
      }, [linkedChildren.map((child) => child.id).join('|')]);

      const child = users.find((item) => item.id === selectedChildId) || null;
      const childMeta = linkedChildren.find((c) => c.id === selectedChildId) || null;
      const childName = child?.name || childMeta?.name || 'your child';

      const childClasses = classes.filter((cls) => cls.studentIds?.includes(selectedChildId) || (child?.classIds || []).includes(cls.id));
      const childInstitutes = institutes.filter((inst) => inst.studentIds?.includes(selectedChildId) || (child?.instituteIds || []).includes(inst.id));
      const childMarks = marks.filter((item) => item.studentId === selectedChildId).sort((a, b) => safeSortKey(b.createdAt) - safeSortKey(a.createdAt));
      const childTests = tests.filter((item) => childClasses.some((cls) => cls.id === item.classId) || childInstitutes.some((inst) => inst.id === item.instituteId)).sort((a, b) => (a.dueDate || '').localeCompare(b.dueDate || ''));
      const childAttendance = attendances.filter((item) => item.studentId === selectedChildId).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const presentCount = childAttendance.filter((item) => item.present).length;
      const attendancePct = childAttendance.length ? Math.round((presentCount / childAttendance.length) * 100) : null;
      const dayOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      const childSchedule = schedules.filter((item) => childClasses.some((cls) => cls.id === item.classId) || childInstitutes.some((inst) => inst.id === item.instituteId)).sort((a, b) => dayOrder.indexOf(a.day) - dayOrder.indexOf(b.day) || (a.time || '').localeCompare(b.time || ''));
      const childFees = fees.filter((item) => item.studentId === selectedChildId);
      const childFeedbacks = feedbacks.filter((item) => item.studentId === selectedChildId).sort((a, b) => safeSortKey(b.createdAt) - safeSortKey(a.createdAt));
      const childDoubts = doubts.filter((item) => item.studentId === selectedChildId).sort((a, b) => safeSortKey(b.createdAt) - safeSortKey(a.createdAt));
      const childHomeworks = homeworks.filter((item) => childClasses.some((cls) => cls.id === item.classId));
      const childAnnouncements = announcements.filter((item) => {
        if (item.studentId) return item.studentId === selectedChildId;
        if (item.classId) return childClasses.some((cls) => cls.id === item.classId);
        if (item.instituteId) return childInstitutes.some((inst) => inst.id === item.instituteId);
        return false;
      });
      const childSyllabusRows = childClasses.flatMap((cls) => (cls.subjects && cls.subjects.length ? cls.subjects : (cls.subject ? [cls.subject] : [])).map((sub) => ({ key: `${cls.id}::${sub}`, classId: cls.id, subject: sub })));

      const getClassName = (id) => classes.find((c) => c.id === id)?.name || 'Class';
      const getInstituteName = (id) => institutes.find((i) => i.id === id)?.name || 'Institute';

      const handleLinkChild = async (event) => {
        event.preventDefault();
        if (!childEmail.trim() || !parentCodeInput.trim()) return addToast("Enter your child's email and their parent code", 'error');
        const result = await linkChildToParent({ parentId: profile.id, parentName: profile.name, childEmail: childEmail.trim(), parentCode: parentCodeInput.trim() });
        if (!result.ok) {
          addToast(result.message, 'error');
          return;
        }
        addToast(`Linked to ${result.studentName}'s account`, 'success');
        setChildEmail('');
        setParentCodeInput('');
        setActiveTab('overview');
      };

      const removeChild = async (id) => {
        await unlinkChild(profile.id, id);
        addToast('Child unlinked', 'info');
      };

      const payFee = async (feeItem) => {
        await updateFee({ ...feeItem, status: 'paid' });
        addToast('Payment recorded — thank you!', 'success');
      };

      const bottomTabs = [
        { id: 'marks', label: 'Marks', icon: '📊' },
        { id: 'attendance', label: 'Attendance', icon: '📅' },
        { id: 'fees', label: 'Fees', icon: '💰' },
        { id: 'feedback', label: 'Feedback', icon: '💬' }
      ];
      const tabs = [
        { id: 'link', label: 'Link a child', icon: '🔗' },
        { id: 'overview', label: 'Overview', icon: '🏠' },
        { id: 'growth', label: 'Growth', icon: '📈' },
        ...bottomTabs,
        { id: 'schedule', label: 'Schedule', icon: '🗓️' },
        { id: 'syllabus', label: 'Syllabus', icon: '📘' },
        { id: 'homework', label: 'Homework', icon: '📝' },
        { id: 'children', label: 'My children', icon: '👪' },
        { id: 'profile', label: 'Profile', icon: '👤' }
      ];

      const marksAvgPct = childMarks.length
        ? Math.round(childMarks.reduce((sum, m) => sum + (m.maxScore ? (m.score / m.maxScore) * 100 : 0), 0) / childMarks.length)
        : null;
      const marksTrend = [...childMarks]
        .sort((a, b) => safeSortKey(a.createdAt) - safeSortKey(b.createdAt))
        .slice(-8)
        .map((m) => ({ label: m.title, pct: m.maxScore ? Math.round((m.score / m.maxScore) * 100) : 0 }));
      const attendanceTrend = [...childAttendance]
        .sort((a, b) => (a.date || '').localeCompare(b.date || ''))
        .slice(-14);
      const doubtsResolvedCount = childDoubts.filter((d) => d.status === 'resolved').length;
      const doubtsResolvedPct = childDoubts.length ? Math.round((doubtsResolvedCount / childDoubts.length) * 100) : null;
      const feesPaidCount = childFees.filter((f) => f.status === 'paid').length;
      const feesPaidPct = childFees.length ? Math.round((feesPaidCount / childFees.length) * 100) : null;
      const growthTone = (pct) => (pct === null ? 'slate' : pct >= 75 ? 'emerald' : pct >= 50 ? 'amber' : 'rose');
      const growthCards = [
        { key: 'attendance', label: 'Attendance', pct: attendancePct, hint: childAttendance.length ? `${presentCount}/${childAttendance.length} classes` : 'No data yet' },

        { key: 'doubts', label: 'Doubts resolved', pct: doubtsResolvedPct, hint: childDoubts.length ? `${doubtsResolvedCount}/${childDoubts.length} answered` : 'No doubts yet' },
        { key: 'fees', label: 'Fees on track', pct: feesPaidPct, hint: childFees.length ? `${feesPaidCount}/${childFees.length} paid` : 'No fees yet' }
      ];

      const subjectAverages = useMemo(() => {
        const grouped = {};
        childMarks.forEach((m) => {
          const key = m.subject || 'General';
          if (!grouped[key]) grouped[key] = { total: 0, count: 0 };
          grouped[key].total += m.maxScore ? (m.score / m.maxScore) * 100 : 0;
          grouped[key].count += 1;
        });
        return Object.entries(grouped).map(([subject, v]) => ({ subject, avg: Math.round(v.total / v.count) }));
      }, [childMarks]);

      const hasChildren = linkedChildren.length > 0;

    function AdmissionChatbot() {
      const [open, setOpen] = useState(false);
      const [chats, setChats] = useState([
        { sender: 'bot', text: 'Hi! I\'m the Vedo assistant. 🎓\n\nAsk me about any of the topics below:' },
      ]);

      const options = [
        { key: 'timing', label: '⏰ Class timing', answer: 'Class timings vary by batch — check the batch card on Discover or ask the institute directly for exact slots.', color: 'cyan' },
        { key: 'fees', label: '💰 Fees', answer: 'Every batch shows its monthly fee right on its card. Once you join, you can track and pay fees from your Student dashboard.', color: 'amber' },
        { key: 'join', label: '📝 How to join', answer: 'Sign up, then use an institute or batch code to send a join request. The owner/teacher approves it and you\'re in!', color: 'emerald' },
        { key: 'features', label: '📱 What Vedo offers', answer: 'Live batches, notes, homework, doubt solving, attendance, fee tracking, and parent linking — all in one place.', color: 'purple' },
        { key: 'trial', label: '🎯 Book a trial', answer: 'Open the Marketplace from Discover, pick a teacher, and tap "Book trial" — your request goes straight to them.', color: 'rose' },

      const query = (opt) => {

      return (
        <div className="fixed bottom-5 right-5 z-[95] text-xs">
