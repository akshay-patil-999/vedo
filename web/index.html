<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Vedo — Connected Coaching Platform</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
    * { box-sizing: border-box; }
    .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border: 1px solid rgba(15,23,42,0.08); }
    .animate-in { animation: slideIn .25s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
    :root[data-theme='dark'] { color-scheme: dark; }
    :root[data-theme='dark'] body { background: #020617; color: #e2e8f0; }
    :root[data-theme='dark'] .glass { background: rgba(15,23,42,0.75); border-color: rgba(255,255,255,0.1); }
    :root[data-theme='dark'] .bg-slate-950, :root[data-theme='dark'] .bg-slate-950\/80, :root[data-theme='dark'] .bg-slate-950\/70, :root[data-theme='dark'] .bg-slate-900, :root[data-theme='dark'] .bg-slate-900\/70, :root[data-theme='dark'] .bg-slate-900\/80, :root[data-theme='dark'] .bg-slate-800 { background-color: #0f172a !important; color: #e2e8f0 !important; }
    :root[data-theme='dark'] .text-slate-100, :root[data-theme='dark'] .text-slate-200, :root[data-theme='dark'] .text-slate-300, :root[data-theme='dark'] .text-slate-400 { color: #cbd5e1 !important; }
    :root[data-theme='light'] body { background: #f8fafc; color: #0f172a; }
    :root[data-theme='light'] .bg-slate-950, :root[data-theme='light'] .bg-slate-950\/80, :root[data-theme='light'] .bg-slate-950\/70, :root[data-theme='light'] .bg-slate-900, :root[data-theme='light'] .bg-slate-900\/70, :root[data-theme='light'] .bg-slate-900\/80, :root[data-theme='light'] .bg-slate-800 { background-color: #ffffff !important; color: #0f172a !important; }
    :root[data-theme='light'] .text-slate-100, :root[data-theme='light'] .text-slate-200, :root[data-theme='light'] .text-slate-300, :root[data-theme='light'] .text-slate-400 { color: #334155 !important; }
    :root[data-theme='light'] .text-white { color: #0f172a !important; }
    :root[data-theme='light'] .border-white\/10 { border-color: rgba(15,23,42,0.1) !important; }

    @keyframes slideIn2 { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes bounce2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .animate-slide-in  { animation: slideIn2 0.3s ease-out forwards; }
    .animate-fade-in   { animation: fadeIn 0.25s ease-out forwards; }
    .animate-spin-slow { animation: spin 1s linear infinite; }
    .animate-bounce2   { animation: bounce2 1s ease-in-out infinite; }
    .gradient-text {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(99,102,241,0.25); }
    .status-paid    { color: #10b981; }
    .status-partial { color: #f59e0b; }
    .status-overdue { color: #ef4444; }
    .btn-google { display:flex; align-items:center; justify-content:center; gap:.5rem; }
    .status-pill { display:inline-flex; align-items:center; gap:.4rem; border-radius:999px; border:1px solid rgba(255,255,255,0.16); padding:0.4rem 0.7rem; font-size:0.8rem; font-weight:600; }
    .metric-card { border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.55); backdrop-filter: blur(12px); }
    .empty-state { color: #94a3b8; font-size: 0.95rem; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { createContext, useContext, useEffect, useMemo, useState } = React;
    const { createRoot } = ReactDOM;

    const StorageKeys = { USER: 'vedo_user', DATA: 'vedo_app_data', OFFLINE: 'vedo_offline_queue' };

    const db = {
      get: (key, fallback) => {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      },
      set: (key, value) => {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
      }
    };

    const firebaseConfig = {
      apiKey: 'AIzaSyA81vHD1OouE3sPLzmgDUS_OH1waade5aY',
      authDomain: 'vedo-01.firebaseapp.com',
      projectId: 'vedo-01',
      storageBucket: 'vedo-01.firebasestorage.app',
      messagingSenderId: '1881105365',
      appId: '1:1881105365:web:9a016b072ff0b3c59ed35c'
    };

    let firestoreRef = null;
    let authRef = null;
    let googleProviderRef = null;
    let backendReady = false;
    try {
      if (window.firebase?.apps?.length) {
        firebase.app();
      } else {
        firebase.initializeApp(firebaseConfig);
      }
      firestoreRef = firebase.firestore();
      authRef = firebase.auth();
      authRef.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .catch((err) => console.warn('Auth persistence set failed:', err));
      googleProviderRef = new firebase.auth.GoogleAuthProvider();
      googleProviderRef.setCustomParameters({ prompt: 'select_account' });
      backendReady = true;
    } catch (error) {
      console.warn('Firebase unavailable, using local fallback.', error);
    }

    const initialState = {
      institutes: [], classes: [], users: [], joinRequests: [], announcements: [],
      fees: [], schedules: [], notes: [], homeworks: [], doubts: [], feedbacks: [], marks: [], attendances: []
    };

    const roleLabels = { student: 'Student', teacher: 'Teacher', owner: 'Owner', parent: 'Parent' };

    function getStudentRosterForClass(classItem, users = [], joinRequests = [], extraRecords = []) {
      if (!classItem) return [];
      const classId = classItem.id;
      const studentIds = new Set();
      const addStudent = (studentId) => {
        if (studentId) studentIds.add(studentId);
      };

      (classItem.studentIds || []).forEach(addStudent);
      (users || []).forEach((user) => {
        if (!user || user.role !== 'student') return;
        const classIds = Array.isArray(user.classIds) ? user.classIds : [];
        if (classIds.includes(classId)) addStudent(user.id);
        if (classItem.instituteId && Array.isArray(user.instituteIds) && user.instituteIds.includes(classItem.instituteId)) addStudent(user.id);
      });
      (joinRequests || []).forEach((request) => {
        if (request?.status === 'approved' && request.targetType === 'class' && request.targetId === classId && request.role === 'student') {
          addStudent(request.requesterId);
        }
      });

      const resolveName = (id) => {
        const user = (users || []).find((item) => item.id === id) || null;
        if (user?.name) return user.name;
        if (user?.email) return user.email;
        const approvedRequest = (joinRequests || []).find((request) => request.requesterId === id
          && request.status === 'approved'
          && request.role === 'student'
          && ((request.targetType === 'class' && request.targetId === classId)
            || (request.targetType === 'institute' && classItem.instituteId && request.targetId === classItem.instituteId)));
        if (approvedRequest?.requesterName) return approvedRequest.requesterName;
        const knownRecord = (extraRecords || []).find((record) => record?.studentId === id && record?.studentName);
        if (knownRecord?.studentName) return knownRecord.studentName;
        return null;
      };

      return Array.from(studentIds).map((id) => {
        const user = (users || []).find((item) => item.id === id) || null;
        const resolvedName = resolveName(id) || 'Unnamed student';
        return {
          id,
          name: resolvedName,
          email: user?.email || '',
          role: user?.role || 'student',
          classId,
          className: classItem.name,
          displayName: resolvedName
        };
      });
    }

    function getStudentDisplayName(student) {
      if (!student) return 'Student';
      return student.studentName || student.name || student.displayName || student.email || 'Unnamed student';
    }

    function getStudentIdLabel() {
      return '';
    }

    // Mirrors getStudentRosterForClass, but resolves every teacher linked to a
    // batch (the primary teacherId plus any co-teachers in teacherIds, plus
    // anyone with an approved teacher join-request for that batch/institute).
    function getTeacherRosterForClass(classItem, users = [], joinRequests = []) {
      if (!classItem) return [];
      const classId = classItem.id;
      const teacherIds = new Set();
      const addTeacher = (teacherId) => { if (teacherId) teacherIds.add(teacherId); };

      addTeacher(classItem.teacherId);
      (classItem.teacherIds || []).forEach(addTeacher);
      (joinRequests || []).forEach((request) => {
        if (request?.status === 'approved' && request.role === 'teacher'
          && ((request.targetType === 'class' && request.targetId === classId)
            || (request.targetType === 'institute' && classItem.instituteId && request.targetId === classItem.instituteId))) {
          addTeacher(request.requesterId);
        }
      });

      const resolveName = (id) => {
        const user = (users || []).find((item) => item.id === id) || null;
        if (user?.name) return user.name;
        if (user?.email) return user.email;
        if (id === classItem.teacherId && classItem.teacherName) return classItem.teacherName;
        const approvedRequest = (joinRequests || []).find((request) => request.requesterId === id
          && request.status === 'approved'
          && request.role === 'teacher'
          && ((request.targetType === 'class' && request.targetId === classId)
            || (request.targetType === 'institute' && classItem.instituteId && request.targetId === classItem.instituteId)));
        if (approvedRequest?.requesterName) return approvedRequest.requesterName;
        return null;
      };

      return Array.from(teacherIds).map((id) => {
        const user = (users || []).find((item) => item.id === id) || null;
        const resolvedName = resolveName(id) || 'Unnamed teacher';
        return { id, name: resolvedName, email: user?.email || '', role: 'teacher', classId, className: classItem.name, displayName: resolvedName };
      });
    }

    const AuthContext = createContext(null);
    const NavContext = createContext(null);
    const ToastContext = createContext(null);
    const AppDataContext = createContext(null);
    const ThemeContext = createContext(null);

    function useAuth() { return useContext(AuthContext); }
    function useNav() { return useContext(NavContext); }
    function useToast() { return useContext(ToastContext); }
    function useAppData() { return useContext(AppDataContext); }
    function useTheme() { return useContext(ThemeContext); }

    function ThemeProvider({ children }) {
      const [theme, setTheme] = useState(() => db.get('vedo_theme', 'light'));
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        document.body.setAttribute('data-theme', theme);
        db.set('vedo_theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme((prev) => (prev === 'light' ? 'dark' : 'light'));
      return <ThemeContext.Provider value={{ theme, toggleTheme }}>{children}</ThemeContext.Provider>;
    }

    function generateCode(length = 6) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < length; i += 1) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    function stamp() {
      return new Date().toISOString();
    }

    const API_BASE = (window.__VEDO_BACKEND_BASE__ || '/api').replace(/\/$/, '');
    const OFFLINE_QUEUE_KEY = StorageKeys.OFFLINE;

    function queueOfflineAction(path, body) {
      try {
        const queue = db.get(OFFLINE_QUEUE_KEY, []);
        queue.push({ path, body, createdAt: stamp() });
        db.set(OFFLINE_QUEUE_KEY, queue);
      } catch (err) {
        console.warn('Failed to queue offline action', err);
      }
    }

    async function apiPost(path, body) {
      const payload = { ...body, source: 'vedo-web', timestamp: Date.now() };
      try {
        const res = await fetch(`${API_BASE}/${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const contentType = res.headers.get('content-type') || '';
        return contentType.includes('application/json') ? await res.json() : { ok: true };
      } catch (err) {
        queueOfflineAction(path, payload);
        console.warn('API POST failed; queued locally', path, err);
        return { queued: true, path };
      }
    }

    async function apiGet(path) {
      try {
        const res = await fetch(`${API_BASE}/${path}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const contentType = res.headers.get('content-type') || '';
        return contentType.includes('application/json') ? await res.json() : { ok: true };
      } catch (err) {
        console.warn('API GET failed', path, err);
        return null;
      }
    }

    function flushOfflineQueue() {
      try {
        if (!navigator.onLine) return;
        const queue = db.get(OFFLINE_QUEUE_KEY, []);
        if (!queue.length) return;
        db.set(OFFLINE_QUEUE_KEY, []);
        queue.forEach((item) => apiPost(item.path, item.body).catch(() => {}));
      } catch (err) {
        console.warn('Failed to flush offline queue', err);
      }
    }

    if (typeof window !== 'undefined') {
      window.addEventListener('online', flushOfflineQueue);
      window.addEventListener('load', flushOfflineQueue);
    }

    function NavProvider({ children }) {
      const [currentPath, setCurrentPath] = useState(() => window.location.hash.replace('#', '') || '/discover');
      const navigateTo = (path) => {
        setCurrentPath(path);
        window.history.pushState({}, '', '#' + path);
      };
      useEffect(() => {
        const onPop = () => {
          const next = window.location.hash.replace('#', '') || '/discover';
          setCurrentPath(next);
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);
      return <NavContext.Provider value={{ currentPath, navigateTo }}>{children}</NavContext.Provider>;
    }

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = (message, tone = 'info') => {
        const id = Date.now() + Math.random();
        setToasts((prev) => [...prev, { id, message, tone }]);
        window.setTimeout(() => setToasts((prev) => prev.filter((item) => item.id !== id)), 2800);
      };
      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed right-3 top-3 z-[80] flex flex-col gap-2 w-[90vw] max-w-sm">
            {toasts.map((toast) => (
              <div key={toast.id} className={`rounded-2xl border px-3 py-2 text-sm shadow-xl animate-in ${toast.tone === 'success' ? 'border-emerald-500/40 bg-emerald-600/95 text-white' : toast.tone === 'error' ? 'border-rose-500/40 bg-rose-600/95 text-white' : 'border-indigo-500/40 bg-slate-900/95 text-slate-100'}`}>
                {toast.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function AppDataProvider({ children }) {
      const [institutes, setInstitutes] = useState(() => db.get(StorageKeys.DATA, initialState)?.institutes || initialState.institutes);
      const [classes, setClasses] = useState(() => db.get(StorageKeys.DATA, initialState)?.classes || initialState.classes);
      const [users, setUsers] = useState(() => db.get(StorageKeys.DATA, initialState)?.users || initialState.users);
      const [joinRequests, setJoinRequests] = useState(() => db.get(StorageKeys.DATA, initialState)?.joinRequests || initialState.joinRequests);
      const [announcements, setAnnouncements] = useState(() => db.get(StorageKeys.DATA, initialState)?.announcements || initialState.announcements);
      const [fees, setFees] = useState(() => db.get(StorageKeys.DATA, initialState)?.fees || initialState.fees);
      const [schedules, setSchedules] = useState(() => db.get(StorageKeys.DATA, initialState)?.schedules || initialState.schedules);
      const [notes, setNotes] = useState(() => db.get(StorageKeys.DATA, initialState)?.notes || initialState.notes);
      const [homeworks, setHomeworks] = useState(() => db.get(StorageKeys.DATA, initialState)?.homeworks || initialState.homeworks);
      const [doubts, setDoubts] = useState(() => db.get(StorageKeys.DATA, initialState)?.doubts || initialState.doubts);
      const [feedbacks, setFeedbacks] = useState(() => db.get(StorageKeys.DATA, initialState)?.feedbacks || initialState.feedbacks);
      const [marks, setMarks] = useState(() => db.get(StorageKeys.DATA, initialState)?.marks || initialState.marks);
      const [attendances, setAttendances] = useState(() => db.get(StorageKeys.DATA, initialState)?.attendances || initialState.attendances);
      const [backendStatus, setBackendStatus] = useState(() => backendReady ? 'live' : (navigator.onLine ? 'local' : 'offline'));

      useEffect(() => {
        const syncStatus = () => setBackendStatus(backendReady && firestoreRef ? 'live' : (navigator.onLine ? 'local' : 'offline'));
        syncStatus();
        window.addEventListener('online', syncStatus);
        window.addEventListener('offline', syncStatus);
        return () => {
          window.removeEventListener('online', syncStatus);
          window.removeEventListener('offline', syncStatus);
        };
      }, []);

      useEffect(() => {
        if (navigator.onLine) flushOfflineQueue();
      }, []);

      useEffect(() => {
        if (!backendReady || !firestoreRef) return;
        const unsubs = [];
        const attach = (collectionName, setter) => {
          const unsub = firestoreRef.collection(collectionName).orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
            setter(snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() })));
          });
          unsubs.push(unsub);
        };
        attach('institutes', setInstitutes);
        attach('classes', setClasses);
        attach('users', setUsers);
        attach('joinRequests', setJoinRequests);
        attach('announcements', setAnnouncements);
        attach('fees', setFees);
        attach('schedules', setSchedules);
        attach('notes', setNotes);
        attach('homeworks', setHomeworks);
        attach('doubts', setDoubts);
        attach('feedbacks', setFeedbacks);
        attach('marks', setMarks);
        attach('attendances', setAttendances);
        return () => unsubs.forEach((fn) => fn());
      }, []);

      useEffect(() => {
        db.set(StorageKeys.DATA, { institutes, classes, users, joinRequests, announcements, fees, schedules, notes, homeworks, doubts, feedbacks, marks, attendances });
      }, [institutes, classes, users, joinRequests, announcements, fees, schedules, notes, homeworks, doubts, feedbacks, marks, attendances]);

      const saveDoc = async (collectionName, item) => {
        if (!backendReady || !firestoreRef) return item;
        const id = item.id || `${collectionName}-${Date.now()}`;
        const payload = { ...item, id };
        await firestoreRef.collection(collectionName).doc(id).set(payload);
        return payload;
      };

      const updateUser = async (userDoc) => {
        if (!backendReady || !firestoreRef) {
          setUsers((prev) => [userDoc, ...prev.filter((item) => item.id !== userDoc.id)]);
          return;
        }
        const payload = { ...userDoc, id: userDoc.id };
        await firestoreRef.collection('users').doc(userDoc.id).set(payload, { merge: true });
        setUsers((prev) => [payload, ...prev.filter((item) => item.id !== userDoc.id)]);
      };

      const createInstitute = async ({ name, city, description, ownerId, ownerName }) => {
        const institute = { id: `INS-${Date.now()}`, name, city, description, ownerId, ownerName, code: generateCode(), createdAt: stamp(), teacherIds: [], studentIds: [], classIds: [] };
        setInstitutes((prev) => [institute, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('institutes').doc(institute.id).set(institute);
        if (ownerId) {
          const ownerDoc = users.find((item) => item.id === ownerId) || { id: ownerId, role: 'owner', instituteIds: [] };
          const nextOwner = { ...ownerDoc, instituteIds: [...new Set([...(ownerDoc.instituteIds || []), institute.id])] };
          await updateUser(nextOwner);
        }
        return institute;
      };

      const createClass = async ({ instituteId, ownerId, teacherId, teacherName, name, subject, fee, schedule, description }) => {
        const cls = { id: `CLS-${Date.now()}`, instituteId: instituteId || null, ownerId: ownerId || null, teacherId: teacherId || null, teacherName: teacherName || '', name, subject, fee: Number(fee || 0), schedule: schedule || 'Weekly', description: description || '', code: generateCode(), createdAt: stamp(), teacherIds: teacherId ? [teacherId] : [], studentIds: [] };
        setClasses((prev) => [cls, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('classes').doc(cls.id).set(cls);
        if (instituteId) {
          setInstitutes((prev) => prev.map((item) => item.id === instituteId ? { ...item, classIds: [...new Set([...(item.classIds || []), cls.id])] } : item));
        }
        if (teacherId) {
          const teacherDoc = users.find((item) => item.id === teacherId) || { id: teacherId, role: 'teacher', classIds: [] };
          const nextTeacher = { ...teacherDoc, classIds: [...new Set([...(teacherDoc.classIds || []), cls.id])] };
          await updateUser(nextTeacher);
        }
        return cls;
      };

      const createJoinRequest = async ({ targetType, targetId, targetName, requesterId, requesterName, role }) => {
        const payload = { id: `REQ-${Date.now()}`, targetType, targetId, targetName, requesterId, requesterName, role, status: 'pending', createdAt: stamp() };
        setJoinRequests((prev) => [payload, ...prev]);
        if (backendReady && firestoreRef) await firestoreRef.collection('joinRequests').doc(payload.id).set(payload);
        return payload;
      };

      const approveRequest = async (requestId) => {
        const request = joinRequests.find((item) => item.id === requestId);
        if (!request) return;
        const nextStatus = 'approved';
        setJoinRequests((prev) => prev.map((item) => item.id === requestId ? { ...item, status: nextStatus, updatedAt: stamp() } : item));
        if (backendReady && firestoreRef) {
          try {
            await firestoreRef.collection('joinRequests').doc(requestId).set({ ...request, status: nextStatus, updatedAt: stamp() }, { merge: true });
          } catch (err) {
            console.warn('Failed to persist approved join request to Firestore', err);
          }
        }

        const targetUser = users.find((item) => item.id === request.requesterId) || { id: request.requesterId, role: request.role, instituteIds: [], classIds: [] };
        const updatedUser = {
          ...targetUser,
          role: request.role,
          instituteIds: request.targetType === 'institute' ? [...new Set([...(targetUser.instituteIds || []), request.targetId])] : targetUser.instituteIds || [],
          classIds: request.targetType === 'class' ? [...new Set([...(targetUser.classIds || []), request.targetId])] : targetUser.classIds || []
        };
        try {
          await updateUser(updatedUser);
        } catch (err) {
          console.warn('Failed to persist joined member profile to Firestore', err);

    function AuthProvider({ children }) {
      const { navigateTo } = useNav();
      const { createInstitute, updateUser } = useAppData();
      const [authUser, setAuthUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!backendReady || !authRef) {
          setLoading(false);
          return;
        }
        const unsubscribe = authRef.onAuthStateChanged(async (user) => {
          setAuthUser(user);
          if (!user) {
            setProfile(null);
            setLoading(false);
            return;
          }
          const snapshot = await firestoreRef.collection('users').doc(user.uid).get();
          let profileData;
          if (snapshot.exists) {
            profileData = { id: user.uid, ...snapshot.data() };
          } else {
            profileData = { id: user.uid, role: 'student', name: user.email, instituteIds: [], classIds: [] };
          }
          setProfile(profileData);
          const target = profileData.role === 'owner' ? '/owner'
            : profileData.role === 'teacher' ? '/teacher'
            : profileData.role === 'parent' ? '/parent'
            : '/student';
          navigateTo(target);
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      const login = async (email, password) => {
        if (!backendReady || !authRef) {
          return { ok: false, message: 'Backend offline right now — please check your connection and try again.' };
        }
        try {
          const result = await authRef.signInWithEmailAndPassword(email, password);
          const snapshot = await firestoreRef.collection('users').doc(result.user.uid).get();
          const profileData = snapshot.exists ? { id: result.user.uid, ...snapshot.data() } : { id: result.user.uid, role: 'student', name: result.user.email, instituteIds: [], classIds: [] };
          setProfile(profileData);
          setAuthUser(result.user);
          const target = profileData.role === 'owner' ? '/owner' : profileData.role === 'teacher' ? '/teacher' : profileData.role === 'parent' ? '/parent' : '/student';
          navigateTo(target);
          return { ok: true };
        } catch (error) {
          return { ok: false, message: error.message || 'Login failed.' };
        }
      };

      // Detects whether this page is running inside the Vedo Flutter WebView,
      // where Firebase's signInWithPopup is blocked by Google
      // ("disallowed_useragent"). In that case we ask Flutter to do a native
      // Google Sign-In and hand back an idToken/accessToken we can exchange
      // for a Firebase credential instead of opening a popup.
      const isInsideFlutterApp = () => typeof window.FlutterGoogleAuth !== 'undefined';

      const finishGoogleProfile = async (user, preferredRole) => {
        const snapshot = await firestoreRef.collection('users').doc(user.uid).get();
        let profileData;
        if (snapshot.exists) {
          profileData = { id: user.uid, ...snapshot.data() };
        } else {
          profileData = {
            id: user.uid,
            authUid: user.uid,
            email: user.email,
            name: user.displayName || user.email,
            photoURL: user.photoURL || null,
            role: preferredRole || 'student',
            instituteIds: [],
            classIds: [],
            createdAt: stamp()
          };
          await firestoreRef.collection('users').doc(user.uid).set(profileData);
        }
        setProfile(profileData);
        setAuthUser(user);
        const target = profileData.role === 'owner' ? '/owner' : profileData.role === 'teacher' ? '/teacher' : profileData.role === 'parent' ? '/parent' : '/student';
        navigateTo(target);
        return { ok: true };
      };

      const loginWithGoogleNative = (preferredRole) => {
        return new Promise((resolve) => {
          window.onFlutterGoogleAuth = async (result) => {
            window.onFlutterGoogleAuth = null;
            if (!result || !result.success) {
              resolve({ ok: false, message: result?.error === 'cancelled' ? 'Google sign-in was cancelled.' : 'Google sign-in failed. Please try again.' });
              return;
            }
            try {
              const credential = firebase.auth.GoogleAuthProvider.credential(result.idToken, result.accessToken);
              const signInResult = await authRef.signInWithCredential(credential);
              const outcome = await finishGoogleProfile(signInResult.user, preferredRole);
              resolve(outcome);
            } catch (error) {
              resolve({ ok: false, message: error.message || 'Google sign-in failed.' });
            }
          };
          window.FlutterGoogleAuth.postMessage('login');
        });
      };

      const loginWithGoogle = async (preferredRole) => {
        if (!backendReady || !authRef) {
          return { ok: false, message: 'Google sign-in needs backend connection. Please try again shortly.' };
        }
        if (isInsideFlutterApp()) {
          return loginWithGoogleNative(preferredRole);
        }
        if (!googleProviderRef) {
          return { ok: false, message: 'Google sign-in is not available right now.' };
        }
        try {
          const result = await authRef.signInWithPopup(googleProviderRef);
          return await finishGoogleProfile(result.user, preferredRole);
        } catch (error) {
          return { ok: false, message: error.message || 'Google sign-in failed.' };
        }
      };

      const signup = async ({ email, password, role, name, instituteName, city }) => {
        if (!backendReady || !authRef) {
          return { ok: false, message: 'Backend offline right now — please check your connection and try again.' };
        }
        try {
          const result = await authRef.createUserWithEmailAndPassword(email, password);
          const profileData = { id: result.user.uid, authUid: result.user.uid, email, name, role, instituteIds: [], classIds: [], createdAt: stamp() };
          await firestoreRef.collection('users').doc(result.user.uid).set(profileData);
          setProfile(profileData);
          setAuthUser(result.user);
          if (role === 'owner' && instituteName) {
            await createInstitute({ name: instituteName, city: city || 'Pune', description: 'New institute created from signup.', ownerId: result.user.uid, ownerName: name });
          }
          const target = role === 'owner' ? '/owner' : role === 'teacher' ? '/teacher' : role === 'parent' ? '/parent' : '/student';
          navigateTo(target);
          return { ok: true };
        } catch (error) {
          return { ok: false, message: error.message || 'Signup failed.' };
        }
      };

      const logout = async () => {
        if (authRef) await authRef.signOut();
        setAuthUser(null);
        setProfile(null);
        navigateTo('/discover');
      };

      const value = { authUser, profile, loading, login, signup, logout, loginWithGoogle };
      return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
    }

    function AuthScreen({ compact = false }) {
      const [mode, setMode] = useState('login');
      const [role, setRole] = useState('student');
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [instituteName, setInstituteName] = useState('');
      const [city, setCity] = useState('Pune');
      const [message, setMessage] = useState('');
      const [busy, setBusy] = useState(false);
      const { login, signup, loginWithGoogle } = useAuth();
      const { addToast } = useToast();

      const handleSubmit = async (event) => {
        event.preventDefault();
        setMessage('');
        setBusy(true);
        if (mode === 'login') {
          const result = await login(email, password);
          if (!result.ok) {
            setMessage(result.message);
            addToast(result.message, 'error');
          } else {
            addToast('Signed in successfully', 'success');
          }
        } else {
          const result = await signup({ email, password, role, name, instituteName, city });
          if (!result.ok) {
            setMessage(result.message);
            addToast(result.message, 'error');
          } else {
            addToast('Account created successfully', 'success');
          }
        }
        setBusy(false);
      };

      const handleGoogle = async () => {
        setMessage('');
        setBusy(true);
        const result = await loginWithGoogle(role);
        if (!result.ok) {
          setMessage(result.message);
          addToast(result.message, 'error');
        } else {
          addToast('Signed in with Google', 'success');
        }
        setBusy(false);
      };

      return (
        <div className={compact ? '' : 'min-h-screen bg-slate-950 px-4 py-10'}>
          <div className={compact ? 'space-y-4' : 'mx-auto max-w-md rounded-[32px] border border-white/10 bg-slate-900/70 p-6 shadow-2xl animate-fade-in'}>
            {!compact && <div className="mb-4 text-center"><span className="text-2xl font-black gradient-text">Vedo</span><p className="text-xs text-slate-400 mt-1">Virtual Education Desk Operator</p></div>}
            <div className="flex rounded-full border border-white/10 bg-white/5 p-1">
              {['login', 'signup'].map((item) => (
                <button key={item} onClick={() => setMode(item)} className={`flex-1 rounded-full px-3 py-2 text-sm font-medium transition-all ${mode === item ? 'bg-indigo-600 text-white' : 'text-slate-300'}`}>{item === 'login' ? 'Login' : 'Sign up'}</button>
              ))}
            </div>
            <select value={role} onChange={(event) => setRole(event.target.value)} className="mt-3 w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm text-slate-100">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="owner">Institute Owner</option>
              <option value="parent">Parent</option>
            </select>
            <button type="button" disabled={busy} onClick={handleGoogle} className="btn-google mt-3 w-full rounded-2xl border border-white/10 bg-white px-3 py-3 text-sm font-semibold text-slate-800 hover:bg-slate-100 transition-all disabled:opacity-60">
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.5 6 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34.5 6 29.5 4 24 4c-7.5 0-13.9 4.2-17.2 10.4z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.3 35.4 26.8 36 24 36c-5.3 0-9.6-3.3-11.2-7.9l-6.5 5C9.9 39.6 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.5l6.3 5.3C40.6 36 44 30.6 44 24c0-1.3-.1-2.6-.4-3.5z"/></svg>
              Continue with Google
            </button>
            <div className="my-3 flex items-center gap-2 text-[10px] uppercase tracking-widest text-slate-500"><div className="h-px flex-1 bg-white/10"></div>or use email<div className="h-px flex-1 bg-white/10"></div></div>
            <form onSubmit={handleSubmit} className="space-y-3">
              {mode === 'signup' && <>
                <input required value={name} onChange={(event) => setName(event.target.value)} placeholder="Your name" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
                {role === 'owner' && <>
                  <input value={instituteName} onChange={(event) => setInstituteName(event.target.value)} placeholder="Institute name" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
                  <input value={city} onChange={(event) => setCity(event.target.value)} placeholder="City" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
                </>}
              </>}
              <input required type="email" value={email} onChange={(event) => setEmail(event.target.value)} placeholder="Email address" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
              <input required type="password" value={password} onChange={(event) => setPassword(event.target.value)} placeholder="Password" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
              <button disabled={busy} className="w-full rounded-2xl bg-indigo-600 px-3 py-3 text-sm font-semibold text-white hover:bg-indigo-500 transition-all disabled:opacity-60">{busy ? 'Please wait...' : mode === 'login' ? 'Login' : 'Create account'}</button>
            </form>
            {message ? <div className="mt-3 rounded-2xl border border-rose-400/20 bg-rose-500/10 p-3 text-sm text-rose-200">{message}</div> : null}
          </div>
        </div>
      );
    }

    function StudentDashboard() {
      const { profile } = useAuth();
      const { institutes, classes, joinRequests, announcements, fees, notes, homeworks, marks, doubts, createJoinRequest, submitHomework, addDoubt, updateFee, users } = useAppData();
      const [joinCode, setJoinCode] = useState('');
      const [activeTab, setActiveTab] = useState('home');
      const [doubtText, setDoubtText] = useState('');
      const [selectedDoubtClassId, setSelectedDoubtClassId] = useState('');
      const { addToast } = useToast();
      const approvedMemberships = joinRequests.filter((item) => item.requesterId === profile?.id && item.status === 'approved');
      const pendingRequests = joinRequests.filter((item) => item.requesterId === profile?.id && item.status === 'pending');
      const requestHistory = joinRequests.filter((item) => item.requesterId === profile?.id && item.status !== 'pending');
      const resolveRequestContact = (request) => {
        if (request.targetType === 'class') {
          const cls = classes.find((item) => item.id === request.targetId);
          if (!cls) return null;
          return users.find((item) => item.id === cls.teacherId) || users.find((item) => item.id === cls.ownerId) || null;
        }
        if (request.targetType === 'institute') {
          const inst = institutes.find((item) => item.id === request.targetId);
          return inst ? users.find((item) => item.id === inst.ownerId) : null;
        }
        return null;
      };
      const contactHintFor = (request) => {
        const contact = resolveRequestContact(request);
        if (!contact) return 'Approval contact will review this request soon.';
        const contactInfo = contact.email ? `email: ${contact.email}` : contact.phone ? `phone: ${contact.phone}` : null;
        return `Approval contact: ${contact.name} (${roleLabels[contact.role] || contact.role})${contactInfo ? ` • ${contactInfo}` : ''}`;
      };
      const visibleInstitutes = institutes.filter((item) => item.studentIds?.includes(profile?.id) || item.teacherIds?.includes(profile?.id) || approvedMemberships.some((req) => req.targetType === 'institute' && req.targetId === item.id) || (profile?.instituteIds || []).includes(item.id));
      const visibleClasses = classes.filter((item) => item.studentIds?.includes(profile?.id) || item.teacherIds?.includes(profile?.id) || approvedMemberships.some((req) => req.targetType === 'class' && req.targetId === item.id) || (profile?.classIds || []).includes(item.id));
      const visibleAnnouncements = announcements.filter((item) => {
        if (item.classId) return visibleClasses.some((cls) => cls.id === item.classId);
        if (item.instituteId) return visibleInstitutes.some((inst) => inst.id === item.instituteId);
        return false;
      });
      const getInstituteName = (id) => institutes.find((item) => item.id === id)?.name || 'Institute';
      const getClassName = (id) => classes.find((item) => item.id === id)?.name || 'Class';
      const studentFees = fees.filter((item) => item.studentId === profile?.id);
      const myDoubts = doubts.filter((item) => item.studentId === profile?.id).sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      const doubtTargets = visibleClasses.flatMap((cls) => getTeacherRosterForClass(cls, users, joinRequests).map((teacher) => ({ key: `${cls.id}::${teacher.id}`, classId: cls.id, className: cls.name, teacherId: teacher.id, teacherName: teacher.name, instituteId: cls.instituteId })));
      useEffect(() => {
        if (doubtTargets.length && !doubtTargets.some((item) => item.key === selectedDoubtClassId)) {
          setSelectedDoubtClassId(doubtTargets[0].key);
        }
        if (!doubtTargets.length && selectedDoubtClassId) {
          setSelectedDoubtClassId('');
        }
      }, [doubtTargets.map((item) => item.key).join('|')]);
      const selectedDoubtTarget = doubtTargets.find((item) => item.key === selectedDoubtClassId) || null;
      const markFeePaid = async (feeId) => {
        const feeItem = fees.find((item) => item.id === feeId);
        if (!feeItem) return;
        await updateFee({ ...feeItem, status: 'paid' });
        addToast('Payment status updated', 'success');
      };
      const joinByCode = async (targetType) => {
        const target = targetType === 'class' ? classes.find((item) => item.code?.toLowerCase() === joinCode.toLowerCase()) : institutes.find((item) => item.code?.toLowerCase() === joinCode.toLowerCase());
        if (!joinCode.trim()) return addToast('Please enter a class or institute code', 'error');
        if (!target) return addToast('No matching class or institute was found', 'error');
        await createJoinRequest({ targetType, targetId: target.id, targetName: target.name, requesterId: profile.id, requesterName: profile.name, role: 'student' });
        addToast(`Join request sent to the ${targetType === 'class' ? 'teacher' : 'owner'}`, 'success');
      };
      const submitSelectedHomework = async (homeworkIdValue) => {
        if (!homeworkIdValue) return;
        await submitHomework({ homeworkId: homeworkIdValue, studentId: profile.id, studentName: profile.name, status: 'submitted' });
        addToast('Homework submitted', 'success');
      };
      const saveDoubt = async (event) => {
        event.preventDefault();
        if (!doubtTargets.length) return addToast('Join a batch before you can ask a doubt', 'error');
        if (!selectedDoubtTarget) return addToast('Select a batch and teacher to send this doubt to', 'error');
        if (!doubtText.trim()) return;
        await addDoubt({ question: doubtText, studentId: profile.id, studentName: profile.name, classId: selectedDoubtTarget.classId, instituteId: selectedDoubtTarget.instituteId || null, teacherId: selectedDoubtTarget.teacherId, teacherName: selectedDoubtTarget.teacherName });
        setDoubtText('');
        addToast(`Doubt sent to ${selectedDoubtTarget.teacherName}`, 'success');
      };
      const tabs = [
        { id: 'home', label: 'Home', icon: '🏠' },

                  <button onClick={() => joinByCode('institute')} className="rounded-full bg-emerald-600 px-3 py-2 text-sm">Join institute</button>
                </div>
              </div>
            </div>
            {activeTab === 'home' && (
              <div className="grid gap-4 xl:grid-cols-2">
                <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                  <h3 className="text-lg font-semibold">My institutes</h3>
                  <div className="mt-3 space-y-2">{visibleInstitutes.length ? visibleInstitutes.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.name}</div><div className="text-sm text-slate-400">Code: {item.code}</div></div>) : <div className="text-sm text-slate-400">No institute joined yet.</div>}</div>

                  <div className="mt-3 space-y-2">{visibleClasses.length ? visibleClasses.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.name}</div><div className="text-sm text-slate-400">Fee: {item.fee} • Code: {item.code}</div></div>) : <div className="text-sm text-slate-400">No batch joined yet.</div>}</div>
                </div>
                <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                  <h3 className="text-lg font-semibold">Announcements & schedule</h3>

                    <input type="date" value={attendanceDate} onChange={(event) => setAttendanceDate(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" />
                    <select value={attendancePresent ? 'present' : 'absent'} onChange={(event) => setAttendancePresent(event.target.value === 'present')} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm">
                      <option value="present">Present</option>
                      <option value="absent">Absent</option>
                    </select>
                  </div>
                  <button className="rounded-full bg-emerald-600 px-3 py-2 text-sm">Save attendance</button>
                </form>
                <div className="mt-4 grid gap-3 md:grid-cols-2">
                  <div className="rounded-2xl border border-white/10 bg-slate-900/70 p-3">
                    <div className="font-medium">Students in this batch ({attendanceOptions.length})</div>
                    <div className="mt-2 space-y-2">
                      {attendanceOptions.length ? attendanceOptions.map((item) => (
                        <div key={`${item.id}-${item.classId}`} className="rounded-xl border border-white/10 bg-slate-950/50 px-3 py-2 text-sm text-slate-300">
                          <div className="font-medium text-slate-100">{getStudentDisplayName(item)}</div>
                        </div>
                      )) : <div className="text-sm text-slate-400">No students linked to this batch yet.</div>}
                    </div>
                  </div>
                  <div className="rounded-2xl border border-white/10 bg-slate-900/70 p-3">
                    <div className="font-medium">Recent attendance</div>
                    <div className="mt-2 space-y-2">
                      {attendanceRecords.length ? attendanceRecords.slice(0, 6).map((item) => (
                        <div key={item.id} className="rounded-xl border border-white/10 bg-slate-950/50 px-3 py-2 text-sm text-slate-300">
                          <div className="font-medium">{item.date} • {item.present ? 'Present' : 'Absent'}</div>
                          <div className="text-slate-400">{item.studentName || getStudentDisplayName(visibleStudents.find((student) => student.id === item.studentId))}</div>
                        </div>
                      )) : <div className="text-sm text-slate-400">No attendance records yet for this class.</div>}
                    </div>
                  </div>
                </div>
              </div>
            )}
            {activeTab === 'homework' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Assign homework</h3><form onSubmit={createNewHomework} className="mt-3 space-y-3"><input value={homeworkTitle} onChange={(event) => setHomeworkTitle(event.target.value)} placeholder="Homework title" required className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><textarea value={homeworkDesc} onChange={(event) => setHomeworkDesc(event.target.value)} placeholder="Description" className="min-h-24 w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={homeworkDue} onChange={(event) => setHomeworkDue(event.target.value)} placeholder="Due date" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><button className="rounded-full bg-emerald-600 px-3 py-2 text-sm">Assign to class</button></form><div className="mt-4 grid gap-3 md:grid-cols-2"><div className="rounded-2xl border border-white/10 bg-slate-900/70 p-3"><div className="font-medium">Batch students</div><div className="mt-2 space-y-2">{attendanceOptions.length ? attendanceOptions.map((item) => <div key={`${item.id}-${item.classId}`} className="rounded-xl border border-white/10 bg-slate-950/50 px-3 py-2 text-sm text-slate-300"><div className="font-medium text-slate-100">{getStudentDisplayName(item)}</div></div>) : <div className="text-sm text-slate-400">No students linked to this batch yet.</div>}</div></div><div className="space-y-2">{homeworks.slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">Due: {item.dueDate}</div></div>)}</div></div></div>}
            {activeTab === 'notes' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Share notes</h3><form onSubmit={shareNote} className="mt-3 space-y-3"><input value={noteTitle} onChange={(event) => setNoteTitle(event.target.value)} placeholder="Note title" required className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><textarea value={noteContent} onChange={(event) => setNoteContent(event.target.value)} placeholder="Note content" className="min-h-24 w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><button className="rounded-full bg-indigo-600 px-3 py-2 text-sm">Share note</button></form><div className="mt-4 space-y-2">{notes.slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">{item.content}</div></div>)}</div></div>}
            {activeTab === 'doubts' && (
              <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
                <h3 className="text-lg font-semibold">Student doubts</h3>
                <p className="text-sm text-slate-400">Doubts sent directly to you by your students, newest first. Only you and the student who asked can see each reply.</p>
                <div className="mt-4 space-y-2">
                  {classDoubts.length ? classDoubts.map((item) => {
                    const cls = classes.find((c) => c.id === item.classId);
                    return (
                      <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover">
                        <div className="flex items-start justify-between gap-3">
                          <div>
                            <div className="font-medium">{item.question}</div>
                            <div className="mt-1 text-xs text-slate-400">{item.studentName || 'Student'} • {cls?.name || 'Batch'}</div>
                          </div>
                          <span className={`rounded-full px-2.5 py-1 text-xs font-medium ${item.status === 'resolved' ? 'bg-emerald-500/10 text-emerald-300' : 'bg-amber-500/10 text-amber-300'}`}>{item.status === 'resolved' ? 'Resolved' : 'Open'}</span>
                        </div>
                        {item.reply ? (
                          <div className="mt-3 rounded-xl border border-emerald-500/20 bg-emerald-500/5 p-3 text-sm text-emerald-200">
                            <div className="text-xs font-semibold uppercase tracking-wide text-emerald-300">Your reply</div>
                            <div className="mt-1">{item.reply}</div>
                          </div>
                        ) : (
                          <div className="mt-3 space-y-2">
                            <textarea value={doubtReplyDrafts[item.id] || ''} onChange={(event) => setDoubtReplyDrafts((prev) => ({ ...prev, [item.id]: event.target.value }))} placeholder="Write a reply only this student will see" className="min-h-16 w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-2 text-sm" />
                            <div className="flex gap-2">
                              <button onClick={() => sendDoubtReply(item.id)} className="rounded-full bg-indigo-600 px-3 py-2 text-xs">Send reply</button>
                              <button onClick={() => markDoubtResolved(item.id)} className="rounded-full bg-emerald-600 px-3 py-2 text-xs">Mark resolved</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  }) : <div className="text-sm text-slate-400">No doubts from your students yet.</div>}
                </div>
              </div>
            )}
            {activeTab === 'feedback' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Feedback</h3><form onSubmit={giveFeedback} className="mt-3 space-y-2"><select value={selectedFeedbackStudent} onChange={(event) => setSelectedFeedbackStudent(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">Select student</option>{visibleStudents.map((student) => <option key={`${student.id}-${student.classId}`} value={student.id}>{getStudentDisplayName(student)}</option>)}</select><textarea value={feedbackText} onChange={(event) => setFeedbackText(event.target.value)} placeholder="Add feedback for a student" className="min-h-20 w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><button className="rounded-full bg-amber-500 px-3 py-2 text-sm">Save feedback</button></form><div className="mt-4 space-y-2">{feedbacks.slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.studentName || 'Student'}</div><div className="text-sm text-slate-400">{item.text}</div></div>)}</div></div>}
          </div>
        </ScreenShell>
      );
    }

    function OwnerDashboard() {
      const { profile } = useAuth();
      const { institutes, classes, users, joinRequests, announcements, fees, schedules, feedbacks, marks, attendances, homeworks, createInstitute, createClass, createAnnouncement, createFee, approveRequest, rejectRequest } = useAppData();
      const [activeTab, setActiveTab] = useState('overview');
      const [instituteName, setInstituteName] = useState('');
      const [city, setCity] = useState('Pune');
      const [className, setClassName] = useState('');
      const [subject, setSubject] = useState('');
      const [fee, setFee] = useState('');
      const [scheduleText, setScheduleText] = useState('');
      const [selectedInstitute, setSelectedInstitute] = useState('');
      const [selectedClass, setSelectedClass] = useState('');
      const [selectedStudent, setSelectedStudent] = useState('');
      const [feeDueDate, setFeeDueDate] = useState(new Date().toISOString().slice(0, 10));
      const [announcementTitle, setAnnouncementTitle] = useState('');
      const [announcementBody, setAnnouncementBody] = useState('');
      const [expandedBatchId, setExpandedBatchId] = useState('');
      const { addToast } = useToast();
      const myInstitutes = institutes.filter((item) => item.ownerId === profile?.id);
      const ownerClasses = classes.filter((item) => item.ownerId === profile?.id);
      const selectedClassObj = ownerClasses.find((item) => item.id === selectedClass) || null;
      const knownStudentNameRecords = [...(fees || []), ...(marks || []), ...(feedbacks || []), ...(attendances || []), ...((homeworks || []).flatMap((hw) => hw.submissions || []))];
      const classStudents = selectedClassObj ? getStudentRosterForClass(selectedClassObj, users, joinRequests, knownStudentNameRecords) : [];
      const totalUniqueStudents = new Set(ownerClasses.flatMap((item) => getStudentRosterForClass(item, users, joinRequests, knownStudentNameRecords).map((student) => student.id))).size;
      const totalUniqueTeachers = new Set(ownerClasses.flatMap((item) => getTeacherRosterForClass(item, users, joinRequests).map((teacher) => teacher.id))).size;
      const classInstitute = institutes.find((item) => item.id === selectedClassObj?.instituteId) || null;
      const ownerFees = fees.filter((item) => ownerClasses.some((cls) => cls.id === item.classId));
      const relevantRequests = [...joinRequests].filter((item) => myInstitutes.some((institute) => institute.id === item.targetId) || classes.some((cls) => cls.ownerId === profile?.id && cls.id === item.targetId)).sort((a, b) => Number(b.status === 'pending') - Number(a.status === 'pending'));
      const addInstitute = async (event) => {
        event.preventDefault();
        if (!instituteName.trim()) return;
        await createInstitute({ name: instituteName, city, description: 'Institute created from owner dashboard', ownerId: profile.id, ownerName: profile.name });
        addToast('Institute created', 'success');
        setInstituteName('');
      };
      const addClass = async (event) => {
        event.preventDefault();
        if (!className.trim()) return;
        await createClass({ instituteId: selectedInstitute || null, ownerId: profile.id, name: className, subject, fee, schedule: scheduleText || 'Weekly', description: 'Batch created from owner dashboard' });
        addToast('Batch created', 'success');
        setClassName('');
        setSubject('');
        setFee('');
      };
      const sendAnnouncement = async (event) => {
        event.preventDefault();
        if (!announcementTitle.trim()) return;
        await createAnnouncement({ title: announcementTitle, message: announcementBody, instituteId: selectedInstitute || null, classId: selectedClass || null, createdBy: profile.name });
        addToast('Notification sent', 'success');
        setAnnouncementTitle('');
        setAnnouncementBody('');
      };
      const addNewFee = async (event) => {
        event.preventDefault();
        if (!selectedClass) return addToast('Select a class before sending a fee reminder', 'error');
        if (!selectedStudent) return addToast('Select a student before sending a fee reminder', 'error');
        if (!fee.trim()) return addToast('Enter a fee amount', 'error');
        if (!feeDueDate) return addToast('Select a due date', 'error');
        const student = classStudents.find((item) => item.id === selectedStudent) || users.find((item) => item.id === selectedStudent) || null;
        if (!student) return addToast('Selected student not found', 'error');
        await createFee({ studentId: student.id, studentName: getStudentDisplayName(student), classId: selectedClass, amount: fee, dueDate: feeDueDate });
        addToast('Fee reminder created', 'success');
        setFee('');
      };
      const sendFeeReminder = async (feeItem) => {
        const cls = classes.find((item) => item.id === feeItem.classId);
        const inst = cls ? institutes.find((item) => item.id === cls.instituteId) : null;
        const title = `Fee reminder for ${feeItem.studentName}`;
        const message = `Dear ${feeItem.studentName}, your fee of ₹${feeItem.amount} for ${cls?.name || 'the class'}${inst ? ` at ${inst.name}` : ''} is due on ${feeItem.dueDate}.`;
        await createAnnouncement({ title, message, instituteId: inst?.id || null, classId: cls?.id || null, createdBy: profile.name });
        addToast('Payment reminder sent', 'success');
      };
      const tabs = [
        { id: 'overview', label: 'Overview', icon: '🏢' },
        { id: 'requests', label: 'Requests', icon: '📩' },
        { id: 'batches', label: 'Batches', icon: '📚' },
        { id: 'announcements', label: 'Alerts', icon: '📢' },
        { id: 'fees', label: 'Fees', icon: '💰' },
        { id: 'settings', label: 'Settings', icon: '⚙️' }
      ];
      return (
        <ScreenShell title="Owner dashboard" subtitle="All owner tools are in the menu." navItems={tabs} activeNavId={activeTab} onNavChange={setActiveTab}>
          <div className="space-y-5">
            <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
              <h2 className="text-xl font-semibold">Institute overview</h2>
              <div className="mt-3 grid gap-3 sm:grid-cols-3">
                <div className="rounded-2xl border border-indigo-400/20 bg-indigo-500/10 p-3 card-hover">
                  <div className="text-2xl font-bold text-indigo-200">{totalUniqueStudents}</div>
                  <div className="text-sm text-indigo-200/80">👨‍🎓 Total students</div>
                </div>
                <div className="rounded-2xl border border-emerald-400/20 bg-emerald-500/10 p-3 card-hover">
                  <div className="text-2xl font-bold text-emerald-200">{totalUniqueTeachers}</div>
                  <div className="text-sm text-emerald-200/80">👩‍🏫 Total teachers</div>
                </div>
                <div className="rounded-2xl border border-amber-400/20 bg-amber-500/10 p-3 card-hover">
                  <div className="text-2xl font-bold text-amber-200">{ownerClasses.length}</div>
                  <div className="text-sm text-amber-200/80">📚 Total batches</div>
                </div>
              </div>
              <div className="mt-3 grid gap-3 md:grid-cols-3">{myInstitutes.length ? myInstitutes.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.name}</div><div className="text-sm text-slate-400">Code: {item.code}</div></div>) : <div className="text-sm text-slate-400">Create an institute first.</div>}<div className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">Pending</div><div className="text-sm text-slate-400">{relevantRequests.filter((item) => item.status === 'pending').length} approvals</div></div></div>
            </div>
            {activeTab === 'overview' && <div className="grid gap-4 xl:grid-cols-2"><div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Create institute</h3><form onSubmit={addInstitute} className="mt-3 space-y-3"><input value={instituteName} onChange={(event) => setInstituteName(event.target.value)} placeholder="Institute name" required className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={city} onChange={(event) => setCity(event.target.value)} placeholder="City" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><button className="rounded-full bg-indigo-600 px-3 py-2 text-sm">Create institute</button></form></div><div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Announcements</h3><div className="mt-3 space-y-2">{announcements.slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">{item.message}</div></div>)}</div></div></div>}
            {activeTab === 'requests' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Pending approvals</h3><div className="mt-3 space-y-2">{relevantRequests.length ? relevantRequests.map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.requesterName} wants to join</div><div className="text-sm text-slate-400">{item.targetName}</div>{item.status === 'pending' ? <div className="mt-2 flex gap-2"><button onClick={() => approveRequest(item.id)} className="rounded-full bg-emerald-600 px-3 py-2 text-xs">Approve</button><button onClick={() => rejectRequest(item.id)} className="rounded-full bg-rose-500 px-3 py-2 text-xs">Reject</button></div> : <div className="mt-2 text-xs font-medium text-emerald-400">{item.status === 'approved' ? 'Approved' : 'Rejected'}</div>}</div>) : <div className="text-sm text-slate-400">No requests yet.</div>}</div></div>}
            {activeTab === 'batches' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Create batch</h3><form onSubmit={addClass} className="mt-3 space-y-3"><select value={selectedInstitute} onChange={(event) => setSelectedInstitute(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">Select institute</option>{myInstitutes.map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}</select><input value={className} onChange={(event) => setClassName(event.target.value)} placeholder="Batch name" required className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={subject} onChange={(event) => setSubject(event.target.value)} placeholder="Subject" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={fee} onChange={(event) => setFee(event.target.value)} placeholder="Fee" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input value={scheduleText} onChange={(event) => setScheduleText(event.target.value)} placeholder="Schedule" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><button className="rounded-full bg-emerald-600 px-3 py-2 text-sm">Create batch</button></form><div className="mt-4 space-y-2">{ownerClasses.length ? ownerClasses.map((item) => {
              const roster = getStudentRosterForClass(item, users, joinRequests, knownStudentNameRecords);
              const teacherRoster = getTeacherRosterForClass(item, users, joinRequests);
              const isOpen = expandedBatchId === item.id;
              return (
                <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover">
                  <button type="button" onClick={() => setExpandedBatchId(isOpen ? '' : item.id)} className="w-full text-left">
                    <div className="flex items-center justify-between gap-2">
                      <div className="font-medium">{item.name}</div>
                      <span className="text-xs text-indigo-300">{isOpen ? 'Hide roster ▲' : 'View roster ▼'}</span>
                    </div>
                    <div className="mt-1 flex flex-wrap gap-2 text-sm text-slate-400">
                      <span>Fee: {item.fee} • Code: {item.code}</span>
                      <span className="rounded-full bg-indigo-500/10 px-2 py-0.5 text-xs font-medium text-indigo-300">👨‍🎓 {roster.length} student{roster.length === 1 ? '' : 's'}</span>
                      <span className="rounded-full bg-emerald-500/10 px-2 py-0.5 text-xs font-medium text-emerald-300">👩‍🏫 {teacherRoster.length} teacher{teacherRoster.length === 1 ? '' : 's'}</span>
                    </div>
                  </button>
                  {isOpen && (
                    <div className="mt-3 space-y-3 border-t border-white/10 pt-3">
                      <div>
                        <div className="text-xs font-semibold uppercase tracking-wide text-slate-400">Students ({roster.length})</div>
                        <div className="mt-1 space-y-1">{roster.length ? roster.map((student) => <div key={student.id} className="text-sm text-slate-200">• {getStudentDisplayName(student)}</div>) : <div className="text-sm text-slate-400">No students linked yet.</div>}</div>
                      </div>
                      <div>
                        <div className="text-xs font-semibold uppercase tracking-wide text-slate-400">Teachers ({teacherRoster.length})</div>
                        <div className="mt-1 space-y-1">{teacherRoster.length ? teacherRoster.map((teacher) => <div key={teacher.id} className="text-sm text-slate-200">• {teacher.name}</div>) : <div className="text-sm text-slate-400">No teachers linked yet.</div>}</div>
                      </div>
                    </div>
                  )}
                </div>
              );
            }) : <div className="text-sm text-slate-400">Create a batch to get started.</div>}</div></div>}
            {activeTab === 'announcements' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Send notification</h3><form onSubmit={sendAnnouncement} className="mt-3 space-y-3"><input value={announcementTitle} onChange={(event) => setAnnouncementTitle(event.target.value)} placeholder="Title" required className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><textarea value={announcementBody} onChange={(event) => setAnnouncementBody(event.target.value)} placeholder="Message" className="min-h-24 w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><div className="grid gap-3 md:grid-cols-2"><select value={selectedInstitute} onChange={(event) => setSelectedInstitute(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">All institutes</option>{myInstitutes.map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}</select><select value={selectedClass} onChange={(event) => setSelectedClass(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">All batches</option>{ownerClasses.map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}</select></div><button className="rounded-full bg-indigo-600 px-3 py-2 text-sm">Send notification</button></form></div>}
            {activeTab === 'fees' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Fee reminders</h3><form onSubmit={addNewFee} className="mt-3 space-y-3"><div className="grid gap-3 md:grid-cols-2"><select value={selectedClass} onChange={(event) => { setSelectedClass(event.target.value); setSelectedStudent(''); }} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">Select class</option>{ownerClasses.map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}</select><select value={selectedStudent} onChange={(event) => setSelectedStudent(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm"><option value="">Select student</option>{classStudents.map((student) => <option key={student.id} value={student.id}>{student.name}</option>)}</select></div><div className="grid gap-3 md:grid-cols-2"><input value={fee} onChange={(event) => setFee(event.target.value)} placeholder="Fee amount" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /><input type="date" value={feeDueDate} onChange={(event) => setFeeDueDate(event.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-3 text-sm" /></div><button className="rounded-full bg-amber-500 px-3 py-2 text-sm">Create reminder</button></form><div className="mt-4 space-y-2">{ownerFees.length ? ownerFees.map((item) => {
                const cls = classes.find((clsItem) => clsItem.id === item.classId);
                const inst = cls ? institutes.find((instItem) => instItem.id === cls.instituteId) : null;
                return <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.studentName || 'Student'} • {cls?.name || 'Class'}{inst ? ` • ${inst.name}` : ''}</div><div className="mt-1 text-sm text-slate-400">₹{item.amount} • Due: {item.dueDate} • Status: {item.status}</div>{item.status === 'pending' ? <button onClick={() => sendFeeReminder(item)} className="mt-3 rounded-full bg-indigo-600 px-3 py-2 text-xs">Send reminder</button> : null}</div>;
              }) : <div className="text-sm text-slate-400">No fee reminders yet.</div>}</div></div>}
            {activeTab === 'settings' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Settings</h3><div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-4 text-sm text-slate-300">Owner controls are now directly available from the ☰ menu for institute, batch, alert and fee management.</div></div>}
          </div>
        </ScreenShell>
      );
    }

    function ParentDashboard() {
      const { profile } = useAuth();
      const { users, fees, announcements, marks } = useAppData();
      const [activeTab, setActiveTab] = useState('overview');
      const child = users.find((item) => item.id === profile?.childId || item.parentId === profile?.id) || null;
      const tabs = [
        { id: 'overview', label: 'Overview', icon: '👪' },
        { id: 'progress', label: 'Progress', icon: '📊' },
        { id: 'attendance', label: 'Attendance', icon: '📅' },
        { id: 'fees', label: 'Fees', icon: '💰' },
        { id: 'contact', label: 'Contact', icon: '💬' }
      ];
      return (
        <ScreenShell title="Parent dashboard" subtitle="All parent tools are in the menu." navItems={tabs} activeNavId={activeTab} onNavChange={setActiveTab}>
          <div className="space-y-5">
            <div className="glass rounded-3xl border border-white/10 p-5 card-hover">
              <h2 className="text-xl font-semibold">Child overview</h2>
              <div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-3">
                <div className="font-medium">{child?.name || 'No linked child yet'}</div>
                <div className="text-sm text-slate-400">{child?.role || 'Pending'}</div>
              </div>
            </div>
            {activeTab === 'overview' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Recent notices</h3><div className="mt-3 space-y-2">{announcements.slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">{item.message}</div></div>)}</div></div>}
            {activeTab === 'progress' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Performance</h3><div className="mt-3 space-y-2">{marks.filter((item) => item.studentId === child?.id).slice(0, 4).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">{item.title}</div><div className="text-sm text-slate-400">Score: {item.score}/{item.maxScore}</div></div>)}</div></div>}
            {activeTab === 'attendance' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Attendance summary</h3><div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-4 text-sm text-slate-300">Attendance updates and class presence are tracked automatically for the linked child.</div></div>}
            {activeTab === 'fees' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Fees & notices</h3><div className="mt-3 space-y-2">{fees.filter((item) => item.studentId === child?.id).map((item) => <div key={item.id} className="rounded-2xl border border-white/10 bg-slate-900/70 p-3 card-hover"><div className="font-medium">₹{item.amount}</div><div className="text-sm text-slate-400">{item.dueDate}</div></div>)}</div></div>}
            {activeTab === 'contact' && <div className="glass rounded-3xl border border-white/10 p-5 card-hover"><h3 className="text-lg font-semibold">Contact support</h3><div className="mt-3 rounded-2xl border border-white/10 bg-slate-900/70 p-4 text-sm text-slate-300">Use the institute owner and teacher contact routes from inside the main app to reach the team quickly.</div></div>}
          </div>
        </ScreenShell>
      );
    }

    function AppRouter() {
      const { currentPath } = useNav();
      const { profile, loading } = useAuth();
      const isPublicRoute = currentPath === '/discover' || currentPath === '/' || currentPath === '';
      const isAuthRoute = currentPath === '/auth' || currentPath === '/login' || currentPath === '/signup';

      if (loading) return <div className="flex min-h-screen items-center justify-center bg-slate-950 text-slate-100">Loading your workspace...</div>;
      if (isAuthRoute) return <AuthScreen />;
      if (!profile) return <DiscoverScreen />;
      if (isPublicRoute) return <DiscoverScreen />;
      if (currentPath === '/owner') return <OwnerDashboard />;
      if (currentPath === '/teacher') return <TeacherDashboard />;
      if (currentPath === '/parent') return <ParentDashboard />;
      if (currentPath === '/student' || currentPath.startsWith('/student')) return <StudentDashboard />;
      return <StudentDashboard />;
    }

    function App() {
      return (
        <ThemeProvider>
          <NavProvider>
            <ToastProvider>
              <AppDataProvider>
                <AuthProvider>
                  <AppRouter />
                </AuthProvider>
              </AppDataProvider>
            </ToastProvider>
          </NavProvider>
        </ThemeProvider>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
